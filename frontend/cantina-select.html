<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="img/logo.ico" type="image/x-icon">
  <title>Selecionar PDV — Cantina</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    body { background: var(--bg-primary); color: var(--text-primary); font-family: 'Inter', sans-serif; margin: 0; }
    .select-wrapper { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
    .select-header { text-align: center; margin-bottom: 40px; }
    .select-header img { width: 64px; height: 64px; object-fit: contain; margin-bottom: 12px; }
    .select-header h1 { font-size: 22px; font-weight: 800; margin: 0 0 4px; }
    .select-header p { font-size: 14px; color: var(--text-secondary); margin: 0; }
    .pdv-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; max-width: 760px; width: 100%; }
    .pdv-card { background: var(--bg-secondary); border: 2px solid var(--border); border-radius: 16px; padding: 32px 24px; text-align: center; cursor: pointer; transition: border-color .15s, transform .15s, box-shadow .15s; text-decoration: none; color: inherit; display: block; }
    .pdv-card:hover { border-color: var(--accent-blue, #2563eb); transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
    .pdv-card.admin-only { border-color: rgba(108,99,255,0.3); }
    .pdv-card.admin-only:hover { border-color: var(--accent-purple); }
    .pdv-icon { font-size: 48px; margin-bottom: 12px; }
    .pdv-title { font-size: 18px; font-weight: 800; margin-bottom: 6px; }
    .pdv-desc { font-size: 12px; color: var(--text-secondary); margin-bottom: 16px; }
    .pdv-stats { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .pdv-stat { font-size: 12px; }
    .pdv-stat .stat-val { font-size: 16px; font-weight: 800; color: var(--accent-blue, #2563eb); display: block; }
    .pdv-stat .stat-lbl { color: var(--text-secondary); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
    .admin-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; background: rgba(108,99,255,0.15); color: var(--accent-purple); font-size: 11px; font-weight: 700; margin-bottom: 8px; }
    .logout-area { margin-top: 32px; }
  </style>
</head>
<body>
  <div class="select-wrapper">
    <div class="select-header">
      <img src="img/logo.png" alt="Logo" onerror="this.style.display='none'">
      <h1>🏪 Cantina</h1>
      <p>Selecione o PDV para acessar</p>
    </div>

    <div class="pdv-grid" id="pdv-grid">
      <div class="page-loading"><div class="spinner"></div><span>Carregando...</span></div>
    </div>

    <div class="logout-area">
      <button onclick="doLogout()" class="btn btn-ghost btn-sm">Sair</button>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function() {
      requireCantinaAccess();
      await loadPdvCards();
    });

    async function loadPdvCards() {
      var grid = document.getElementById('pdv-grid');
      try {
        var today = new Date();
        var fmt = function(d) {
          var m = d.getMonth()+1, day = d.getDate();
          return d.getFullYear()+'-'+(m<10?'0'+m:m)+'-'+(day<10?'0'+day:day);
        };
        var todayStr = fmt(today);
        var params = { date_from: todayStr, date_to: todayStr };

        var [s1, s2] = await Promise.all([
          CantinAPI.cash(Object.assign({}, params, { pdv_id: 1 })),
          CantinAPI.cash(Object.assign({}, params, { pdv_id: 2 })),
        ]);

        var userRole = localStorage.getItem('sp_role') || '';
        var isAdmin = userRole === 'admin';

        var consolidadoCard = isAdmin ? `
          <a href="cantina-consolidado.html" class="pdv-card admin-only">
            <div class="pdv-icon">📊</div>
            <div class="admin-badge">Apenas Admin</div>
            <div class="pdv-title">Consolidado</div>
            <div class="pdv-desc">Relatório unificado dos dois PDVs</div>
            <div class="pdv-stats">
              <div class="pdv-stat">
                <span class="stat-val">R$ ${formatMoney((s1.total_vendas||0)+(s2.total_vendas||0))}</span>
                <span class="stat-lbl">Total Vendas</span>
              </div>
              <div class="pdv-stat">
                <span class="stat-val">${(s1.orders_count||0)+(s2.orders_count||0)}</span>
                <span class="stat-lbl">Pedidos</span>
              </div>
            </div>
          </a>` : '';

        grid.innerHTML = `
          <a href="cantina.html?pdv=1" class="pdv-card">
            <div class="pdv-icon">🏪</div>
            <div class="pdv-title">PDV 1</div>
            <div class="pdv-desc">Ponto de Venda 1</div>
            <div class="pdv-stats">
              <div class="pdv-stat">
                <span class="stat-val">R$ ${formatMoney(s1.total_vendas||0)}</span>
                <span class="stat-lbl">Vendas Hoje</span>
              </div>
              <div class="pdv-stat">
                <span class="stat-val">${s1.orders_count||0}</span>
                <span class="stat-lbl">Pedidos</span>
              </div>
            </div>
          </a>
          <a href="cantina.html?pdv=2" class="pdv-card">
            <div class="pdv-icon">🏪</div>
            <div class="pdv-title">PDV 2</div>
            <div class="pdv-desc">Ponto de Venda 2</div>
            <div class="pdv-stats">
              <div class="pdv-stat">
                <span class="stat-val">R$ ${formatMoney(s2.total_vendas||0)}</span>
                <span class="stat-lbl">Vendas Hoje</span>
              </div>
              <div class="pdv-stat">
                <span class="stat-val">${s2.orders_count||0}</span>
                <span class="stat-lbl">Pedidos</span>
              </div>
            </div>
          </a>
          ${consolidadoCard}`;
      } catch(e) {
        grid.innerHTML = `
          <a href="cantina.html?pdv=1" class="pdv-card">
            <div class="pdv-icon">🏪</div>
            <div class="pdv-title">PDV 1</div>
            <div class="pdv-desc">Ponto de Venda 1</div>
          </a>
          <a href="cantina.html?pdv=2" class="pdv-card">
            <div class="pdv-icon">🏪</div>
            <div class="pdv-title">PDV 2</div>
            <div class="pdv-desc">Ponto de Venda 2</div>
          </a>`;
      }
    }

    function doLogout() {
      if (typeof logout === 'function') logout();
      else { localStorage.clear(); window.location.href = 'login.html'; }
    }
  </script>
</body>
</html>
