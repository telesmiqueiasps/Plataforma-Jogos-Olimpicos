<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="img/logo.ico" type="image/x-icon">
  <title>Campeonatos — Jogos Olímpicos Sinodal PB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    body { background: var(--bg-primary); color: var(--text-primary); font-family: 'Inter', sans-serif; margin: 0; }
    .pub-header { background: var(--bg-secondary); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    .pub-header .logo-wrap { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text-primary); }
    .pub-header .logo-wrap img { width: 36px; height: 36px; object-fit: contain; }
    .pub-header .logo-wrap span { font-weight: 700; font-size: 15px; line-height: 1.2; }
    .pub-header .champ-info { flex: 1; min-width: 0; }
    .pub-header .champ-title { font-size: 16px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pub-header .champ-sport { font-size: 12px; color: var(--text-secondary); }
    .pub-content { max-width: 960px; margin: 0 auto; padding: 24px 16px 48px; }
    .pub-footer { text-align: center; padding: 24px; color: var(--text-secondary); font-size: 12px; border-top: 1px solid var(--border); margin-top: 48px; }
    .pub-footer a { color: var(--accent-purple); text-decoration: none; }
    .tab-nav { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 0; }
    .tab-btn { padding: 8px 16px; border: none; background: none; color: var(--text-secondary); cursor: pointer; font-size: 13px; font-weight: 500; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color .15s, border-color .15s; border-radius: 0; }
    .tab-btn:hover { color: var(--text-primary); }
    .tab-btn.active { color: var(--accent-purple); border-bottom-color: var(--accent-purple); }
    .standings-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .standings-table th { padding: 6px 10px; text-align: center; color: var(--text-secondary); font-weight: 600; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid var(--border); }
    .standings-table th:nth-child(2) { text-align: left; }
    .standings-table td { padding: 8px 10px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .standings-table td:nth-child(2) { text-align: left; }
    .standings-table .pts { font-weight: 800; color: var(--accent-purple); }
    .classified-row { background: rgba(0, 212, 170, 0.06); }
    .badge-classified { display: inline-block; padding: 2px 6px; border-radius: 4px; background: rgba(0,212,170,0.15); color: var(--accent-teal); font-size: 10px; font-weight: 600; margin-left: 6px; }
    .badge-suspended { display: inline-block; padding: 2px 6px; border-radius: 4px; background: rgba(239,68,68,0.15); color: #f87171; font-size: 10px; font-weight: 600; }
    .badge-free { display: inline-block; padding: 2px 6px; border-radius: 4px; background: rgba(0,212,170,0.12); color: var(--accent-teal); font-size: 10px; font-weight: 600; }
    .stat-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .stat-table th { padding: 6px 10px; text-align: left; color: var(--text-secondary); font-weight: 600; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid var(--border); }
    .stat-table td { padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: middle; }
    .game-status-badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; }
    .pub-champ-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; padding: 20px; cursor: pointer; transition: border-color .15s, transform .15s; text-decoration: none; color: inherit; display: block; }
    .pub-champ-card:hover { border-color: var(--accent-purple); transform: translateY(-2px); }
    .back-btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 8px; background: rgba(108,99,255,0.1); border: 1px solid rgba(108,99,255,0.3); color: var(--accent-purple); font-size: 13px; font-weight: 500; text-decoration: none; cursor: pointer; }
    .game-row-pub { display: flex; align-items: center; gap: 12px; padding: 12px 16px; flex-wrap: wrap; }
    .game-teams-pub { flex: 1; display: flex; align-items: center; gap: 12px; min-width: 0; flex-wrap: wrap; }
    .game-team-pub { flex: 1; font-size: 14px; font-weight: 600; min-width: 80px; display: flex; align-items: center; gap: 6px; }
    .game-team-pub.right { justify-content: flex-end; text-align: right; }
    .game-score-pub { font-size: 20px; font-weight: 800; color: var(--accent-purple); white-space: nowrap; padding: 0 8px; }
    .game-vs-pub { font-size: 13px; color: var(--text-secondary); padding: 0 8px; }
    .game-meta-pub { font-size: 11px; color: var(--text-secondary); text-align: right; min-width: 100px; }
    .table-responsive { overflow-x: auto; -webkit-overflow-scrolling: touch; width: 100%; }
    @media (max-width: 768px) {
      .table-responsive .standings-table { min-width: 520px; font-size: 12px; }
      .table-responsive .standings-table th, .table-responsive .standings-table td { padding: 7px 6px; white-space: nowrap; }
      .table-responsive .stat-table { min-width: 400px; }
      .table-responsive .stat-table th, .table-responsive .stat-table td { white-space: nowrap; padding: 7px 8px; }
    }
    .game-events-panel { padding: 12px 16px 14px; border-top: 1px dashed rgba(255,255,255,0.08); background: rgba(0,0,0,0.12); }
    .game-events-cols { display: flex; gap: 16px; }
    .game-events-col { flex: 1; min-width: 0; }
    .game-events-col-hdr { font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid var(--border); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .game-event-item { font-size: 12px; padding: 2px 0; line-height: 1.5; }
    .game-events-footer { font-size: 11px; color: var(--text-secondary); margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--border); text-align: right; }
    @media (max-width: 400px) {
      .game-events-cols { flex-direction: column; gap: 8px; }
    }
  </style>
</head>
<body>

<header class="pub-header" id="pub-header">
  <a href="public.html" class="logo-wrap">
    <img src="img/logo.png" alt="Logo">
    <span>Jogos Olímpicos<br>Sinodal PB</span>
  </a>
  <div class="champ-info" id="header-champ-info" style="display:none;">
    <div class="champ-title" id="header-champ-name"></div>
    <div class="champ-sport" id="header-champ-sport"></div>
  </div>
  <div style="margin-left:auto; display:flex; align-items:center; gap:10px;">
    <span id="header-champ-status"></span>
    <a href="public.html" id="btn-back" class="back-btn" style="display:none;">← Outros campeonatos</a>
  </div>
</header>

<div class="pub-content" id="pub-content">
  <div class="page-loading" style="padding:60px; display:flex; flex-direction:column; align-items:center; gap:12px;">
    <div class="spinner"></div>
    <span>Carregando...</span>
  </div>
</div>

<footer class="pub-footer-grad">
  <div class="pub-footer-logo">🏆</div>
  <div class="pub-footer-brand">Jogos Olímpicos Sinodal PB</div>
  <div class="pub-footer-sub">
    Powered by Miquéias Teles</a> ·
    <a href="https://jogossinodal.netlify.app" target="_blank">Acesso para organizadores →</a>
  </div>
</footer>

<div id="toast-container"></div>

<script src="js/app.js"></script>
<script>
  const API_BASE = 'https://sports-platform-api.onrender.com';

  async function pubFetch(path) {
    const token = localStorage.getItem('sp_token');
    const headers = { 'Content-Type': 'application/json' };
    if (token) headers['Authorization'] = 'Bearer ' + token;

    const res = await fetch(API_BASE + path, { headers: headers });

    if (res.status === 401) {
      // Endpoint público — tentar sem token
      const res2 = await fetch(API_BASE + path, {
        headers: { 'Content-Type': 'application/json' }
      });
      if (!res2.ok) throw new Error(await res2.text());
      if (res2.status === 204) return null;
      return res2.json();
    }

    if (!res.ok) throw new Error(await res.text());
    if (res.status === 204) return null;
    return res.json();
  }

  function pubStatusBadge(status) {
    const map = {
      draft:    ['Rascunho', '#6b7280'],
      active:   ['Ativo', '#00d4aa'],
      finished: ['Encerrado', '#6c63ff'],
    };
    const [label, color] = map[status] || [status, '#6b7280'];
    return `<span style="display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;background:${color}22;color:${color};">${label}</span>`;
  }

  function gameStatusBadge(status) {
    if (status === 'live') {
      return `<span class="game-status-badge" style="background:rgba(0,212,170,0.15);color:#00d4aa;">● Ao Vivo</span>`;
    }
    if (status === 'finished' || status === 'completed') {
      return `<span class="game-status-badge" style="background:rgba(108,99,255,0.15);color:#6c63ff;">Encerrado</span>`;
    }
    return `<span class="game-status-badge" style="background:rgba(107,114,128,0.15);color:#9ca3af;">Agendado</span>`;
  }

  const champId = new URLSearchParams(window.location.search).get('championship');

  if (champId) {
    showChampionshipPage(Number(champId));
  } else {
    showChampionshipList();
  }

  // ================================================================
  // LISTA DE CAMPEONATOS ATIVOS
  // ================================================================
  async function showChampionshipList() {
    const content = document.getElementById('pub-content');
    try {
      const all = await pubFetch('/api/championships/');
      const active = all.filter(c => c.status === 'active' || c.status === 'finished');

      if (!active.length) {
        content.innerHTML = `
          <div style="text-align:center; padding:60px 20px;">
            <div style="font-size:48px; margin-bottom:16px;">🏆</div>
            <h2 style="margin-bottom:8px;">Nenhum campeonato ativo</h2>
            <p style="color:var(--text-secondary);">Ainda não há campeonatos disponíveis para visualização.</p>
          </div>`;
        return;
      }

      const slugHeaderBg = {
        futsal:'#dbeafe',volleyball:'#d1fae5',basketball:'#fed7aa',
        running:'#fce7f3',domino:'#ede9fe',dama:'#fef3c7',xadrez:'#f1f5f9',
      };
      content.innerHTML = `
        <h2 style="margin-bottom:20px;font-family:var(--font-display);font-size:22px;font-weight:800;">🏆 Campeonatos</h2>
        <div class="champ-cards-grid">
          ${active.map(c => {
            const headerBg = slugHeaderBg[c.sport?.slug] || '#f1f5f9';
            const borderClass = c.status === 'active' ? 'active-border' : 'draft-border';
            return `
            <a href="public.html?championship=${c.id}" class="champ-card ${borderClass}" style="text-decoration:none;color:inherit;">
              <div class="champ-card-header" style="background:${headerBg};">
                <div class="champ-card-icon">${sportIcon(c.sport?.slug, 36)}</div>
                <div class="champ-card-info">
                  <div class="champ-card-name" title="${c.name}">${c.name}</div>
                  <div class="champ-card-sport">${c.sport?.name || '—'}</div>
                </div>
                ${pubStatusBadge(c.status)}
              </div>
              <div class="champ-card-body">
                ${c.start_date ? `<div class="champ-card-dates">📅 ${fmtDate(c.start_date)}${c.end_date ? ' – ' + fmtDate(c.end_date) : ''}</div>` : ''}
                <div class="champ-card-dates">📋 ${({round_robin:'Pontos Corridos',elimination:'Eliminatório',hybrid:'Híbrido'})[c.format] || c.format || '—'}</div>
              </div>
              <div class="champ-card-footer">
                <span class="btn btn-primary btn-sm" style="pointer-events:none;">Ver Campeonato →</span>
              </div>
            </a>`;
          }).join('')}
        </div>`;
    } catch (err) {
      content.innerHTML = `<div class="alert alert-error" style="margin:24px 0;">${err.message}</div>`;
    }
  }

  // ================================================================
  // PÁGINA DO CAMPEONATO
  // ================================================================
  let currentChamp = null;
  const eventsCache = {};

  // Helpers globais — definidos no escopo raiz do script para acesso universal
  function isDomino()    { return currentChamp && currentChamp.sport && currentChamp.sport.slug === 'domino'; }
  function isDama()      { return currentChamp && currentChamp.sport && currentChamp.sport.slug === 'dama'; }
  function isXadrez()    { return currentChamp && currentChamp.sport && currentChamp.sport.slug === 'xadrez'; }
  function isTenisMesa() { return currentChamp && currentChamp.sport && currentChamp.sport.slug === 'tenis_mesa'; }
  function isBoardgame() { return isDomino() || isDama() || isXadrez(); }

  async function showChampionshipPage(id) {
    const content = document.getElementById('pub-content');
    try {
      currentChamp = await pubFetch(`/api/championships/${id}`);
      const c = currentChamp;

      // Update header
      document.getElementById('header-champ-info').style.display = 'block';
      document.getElementById('header-champ-name').innerHTML =
        `${sportIcon(c.sport?.slug, 22)}${c.name}`;
      document.getElementById('header-champ-sport').innerHTML =
        `${sportIcon(c.sport?.slug, 14)}${c.sport?.name || ''}`;
      document.getElementById('header-champ-status').innerHTML = pubStatusBadge(c.status);
      document.getElementById('btn-back').style.display = 'flex';
      document.title = `${c.name} — Jogos Olímpicos Sinodal PB`;

      // Hero section
      const heroColors = {
        futsal:'linear-gradient(135deg,#1d4ed8,#3b82f6)',
        volleyball:'linear-gradient(135deg,#047857,#10b981)',
        basketball:'linear-gradient(135deg,#b45309,#f59e0b)',
        running:'linear-gradient(135deg,#b91c1c,#ef4444)',
        domino:'linear-gradient(135deg,#5b21b6,#8b5cf6)',
        dama:'linear-gradient(135deg,#9d174d,#ec4899)',
        xadrez:'linear-gradient(135deg,#374151,#6b7280)',
        tenis_mesa:'linear-gradient(135deg,#0f766e,#14b8a6)',
      };
      const heroBg = heroColors[c.sport?.slug] || 'linear-gradient(135deg,#1e3a8a,#2563eb)';
      const heroEmoji = {
        futsal:'⚽',volleyball:'🏐',basketball:'🏀',running:'🏃',
        domino:'🁣',dama:'♟',xadrez:'♟',tenis_mesa:'🏓',
      }[c.sport?.slug] || '🏆';
      const statusMap = {active:'Ativo',finished:'Encerrado',draft:'Rascunho'};
      const heroHtml = `
        <div class="pub-hero" style="background:${heroBg};">
          <div class="pub-hero-icon">${heroEmoji}</div>
          <div class="pub-hero-content">
            <div class="pub-hero-badge">${statusMap[c.status] || c.status}</div>
            <h1 class="pub-hero-title">${c.name}</h1>
            <div class="pub-hero-stats">
              <div class="pub-hero-stat">🏅 ${c.sport?.name || '—'}</div>
              ${c.start_date ? `<div class="pub-hero-stat">📅 ${fmtDate(c.start_date)}${c.end_date ? ' – ' + fmtDate(c.end_date) : ''}</div>` : ''}
              ${c.format ? `<div class="pub-hero-stat">📋 ${({round_robin:'Pontos Corridos',elimination:'Eliminatório',hybrid:'Híbrido'})[c.format] || c.format}</div>` : ''}
            </div>
          </div>
        </div>`;

      const isVball   = c.sport?.slug === 'volleyball';
      const isBball   = c.sport?.slug === 'basketball';
      const isRunning = c.sport?.slug === 'running';

      if (isRunning) {
        // Corrida: apenas aba de Ranking
        content.innerHTML = heroHtml + `
          <div class="tab-nav">
            <button class="tab-btn active" data-pub-tab="race-ranking">🏆 Ranking</button>
          </div>
          <div id="pub-tab-race-ranking"></div>
        `;
        document.querySelectorAll('[data-pub-tab]').forEach(btn => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('[data-pub-tab]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            loadPubTab(btn.dataset.pubTab);
          });
        });
        loadPubTab('race-ranking');
        return;
      }

      if (isBoardgame()) {
        // Jogos de Tabuleiro: abas Classificação + Jogos
        content.innerHTML = heroHtml + `
          <div class="tab-nav">
            <button class="tab-btn active" data-pub-tab="bg-standings">🏆 Classificação</button>
            <button class="tab-btn" data-pub-tab="bg-games">🎮 Jogos</button>
          </div>
          <div id="pub-tab-bg-standings"></div>
          <div id="pub-tab-bg-games" style="display:none;"></div>
        `;
        document.querySelectorAll('[data-pub-tab]').forEach(btn => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('[data-pub-tab]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            ['bg-standings', 'bg-games'].forEach(t => {
              const tabEl = document.getElementById(`pub-tab-${t}`);
              if (tabEl) tabEl.style.display = 'none';
            });
            const tab = btn.dataset.pubTab;
            const activeEl = document.getElementById(`pub-tab-${tab}`);
            if (activeEl) activeEl.style.display = 'block';
            loadPubTab(tab);
          });
        });
        loadPubTab('bg-standings');
        return;
      }

      if (isTenisMesa()) {
        // Tênis de Mesa: abas Classificação + Jogos
        content.innerHTML = heroHtml + `
          <div class="tab-nav">
            <button class="tab-btn active" data-pub-tab="tm-standings">🏆 Classificação</button>
            <button class="tab-btn" data-pub-tab="tm-games">🎮 Jogos</button>
          </div>
          <div id="pub-tab-tm-standings"></div>
          <div id="pub-tab-tm-games" style="display:none;"></div>
        `;
        document.querySelectorAll('[data-pub-tab]').forEach(btn => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('[data-pub-tab]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            ['tm-standings', 'tm-games'].forEach(t => {
              const tabEl = document.getElementById(`pub-tab-${t}`);
              if (tabEl) tabEl.style.display = 'none';
            });
            const tab = btn.dataset.pubTab;
            const activeEl = document.getElementById(`pub-tab-${tab}`);
            if (activeEl) activeEl.style.display = 'block';
            loadPubTab(tab);
          });
        });
        loadPubTab('tm-standings');
        return;
      }

      // Build tabs — oculta artilharia e cartões para vôlei e tênis de mesa; basquete mostra Cestinhas mas não Cartões
      const isTenis = c.sport?.slug === 'tenis_mesa';
      const extraTabs = (isVball || isTenis) ? '' : isBball
        ? `<button class="tab-btn" data-pub-tab="scorers">🏀 Cestinhas</button>`
        : `<button class="tab-btn" data-pub-tab="scorers">Artilharia</button>
           <button class="tab-btn" data-pub-tab="cards">Cartões</button>`;
      content.innerHTML = heroHtml + `
        <div class="tab-nav">
          <button class="tab-btn active" data-pub-tab="standings">Classificação</button>
          ${extraTabs}
          <button class="tab-btn" data-pub-tab="games">Jogos</button>
        </div>
        <div id="pub-tab-standings"></div>
        <div id="pub-tab-scorers" style="display:none;"></div>
        <div id="pub-tab-cards" style="display:none;"></div>
        <div id="pub-tab-games" style="display:none;"></div>
      `;

      document.querySelectorAll('[data-pub-tab]').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('[data-pub-tab]').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          ['standings', 'scorers', 'cards', 'games'].forEach(t => {
            document.getElementById(`pub-tab-${t}`).style.display = 'none';
          });
          const tab = btn.dataset.pubTab;
          document.getElementById(`pub-tab-${tab}`).style.display = 'block';
          loadPubTab(tab);
        });
      });

      loadPubTab('standings');
    } catch (err) {
      content.innerHTML = `<div class="alert alert-error" style="margin:24px 0;">${err.message}</div>`;
    }
  }

  const loadedTabs = {};

  async function loadPubTab(tab) {
    if (loadedTabs[tab]) return;
    loadedTabs[tab] = true;
    const el = document.getElementById(`pub-tab-${tab}`);
    el.innerHTML = '<div class="page-loading" style="padding:40px;"><div class="spinner"></div><span>Carregando...</span></div>';
    try {
      if (tab === 'standings')         await renderStandings(el);
      else if (tab === 'scorers')      await renderScorers(el);
      else if (tab === 'cards')        await renderCards(el);
      else if (tab === 'games')        await renderGames(el);
      else if (tab === 'race-ranking') await renderPubRaceRanking(el);
      else if (tab === 'bg-standings') await renderPubBgStandings(el);
      else if (tab === 'bg-games')     await renderPubBgGames(el);
      else if (tab === 'tm-standings') await renderPubTenisMesaStandings(el);
      else if (tab === 'tm-games')     await renderPubTenisMesaGames(el);
    } catch (err) {
      el.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
    }
  }

  // ================================================================
  // ABA: CLASSIFICAÇÃO
  // ================================================================
  async function renderStandings(el) {
    const c = currentChamp;
    const classified = c.classifieds_per_group || (c.rules_config?.classifieds_per_group) || 2;

    try {
      const groups = await pubFetch(`/api/championships/${c.id}/groups`);

      if (!groups || !groups.length) {
        // Sem grupos: mostrar tabela geral
        const standings = await pubFetch(`/api/championships/${c.id}/standings`);
        if (!standings || !standings.length) {
          el.innerHTML = `<div style="padding:32px; text-align:center; color:var(--text-secondary);">Nenhum dado de classificação disponível.</div>`;
          return;
        }
        el.innerHTML = `<div class="card"><div class="card-body" style="padding:0;">${standingsTable(standings, 0)}</div></div>`;
        return;
      }

      // Com grupos
      const standingsArr = await Promise.all(
        groups.map(g => pubFetch(`/api/championships/${c.id}/standings?group=${g.group}&phase=groups`).catch(() => []))
      );

      let html = '';
      groups.forEach((g, i) => {
        const rows = standingsArr[i] || [];
        html += `
          <div class="card" style="margin-bottom:16px;">
            <div class="card-body" style="padding:0;">
              <div style="padding:12px 16px; font-weight:700; font-size:13px; color:var(--accent-purple); text-transform:uppercase; letter-spacing:0.5px; border-bottom:1px solid var(--border);">
                Grupo ${g.group}
              </div>
              ${standingsTable(rows, classified)}
            </div>
          </div>`;
      });
      el.innerHTML = html || `<div style="padding:32px; text-align:center; color:var(--text-secondary);">Nenhum jogo disputado ainda.</div>`;
    } catch {
      el.innerHTML = `<div style="padding:32px; text-align:center; color:var(--text-secondary);">Nenhum dado de classificação disponível.</div>`;
    }
  }

  function standingsTable(rows, classifiedPerGroup) {
    if (!rows.length) return `<div style="padding:20px; color:var(--text-secondary); font-size:13px;">Nenhum jogo disputado ainda.</div>`;
    const isVball = currentChamp?.sport?.slug === 'volleyball';
    const isBball = currentChamp?.sport?.slug === 'basketball';
    const isTenis = currentChamp?.sport?.slug === 'tenis_mesa';
    const medals = ['🥇','🥈','🥉'];
    const avatarColors = ['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#0891b2','#6b7280'];
    // Tênis de mesa usa athlete_id/name em vez de team_id/team_name
    const nameField = isTenis ? 'name' : 'team_name';
    return `
      <div class="table-responsive"><table class="standings-table standings-enhanced">
        <thead>
          <tr>
            <th style="text-align:center;width:44px;">#</th>
            <th style="text-align:left;">${isTenis ? 'Jogador' : 'Equipe'}</th>
            ${(isVball || isTenis)
              ? '<th>J</th><th>V</th><th>D</th><th>S+</th><th>S-</th><th>Saldo</th><th>Avg</th><th class="pts-col">Pts</th>'
              : isBball
                ? '<th>J</th><th>V</th><th>D</th><th>Pts+</th><th>Pts-</th><th>Saldo</th><th class="pts-col">Tab</th>'
                : '<th>J</th><th>V</th><th>E</th><th>D</th><th>GP</th><th>GC</th><th>SG</th><th title="Cartões amarelos">🟨</th><th title="Cartões vermelhos">🟥</th><th title="Faltas">F</th><th class="pts-col" title="Critérios de desempate: Saldo de gols → Vermelhos → Amarelos → Faltas → Vitórias → Empates → Derrotas">Pts</th>'}
          </tr>
        </thead>
        <tbody>
          ${rows.map((s, i) => {
            const isLeader = i === 0;
            const isClassified = classifiedPerGroup > 0 && i < classifiedPerGroup;
            const medal = medals[i] || '';
            const displayName = s[nameField] || '?';
            const initials = displayName.substring(0, 2).toUpperCase();
            const avatarColor = avatarColors[i % avatarColors.length];
            const samePts = i > 0 && rows[i - 1].points === s.points;
            const rowClass = isLeader ? 'leader-row' : (isClassified ? 'classified-row' : '');
            const ptsTip = samePts ? 'title="Empatado em pontos — verificando critérios de desempate"' : '';
            return `
            <tr class="${rowClass}" style="${samePts && !isLeader && !isClassified ? 'background:rgba(255,251,235,0.04);' : ''}">
              <td style="text-align:center;">
                ${medal
                  ? `<span style="font-size:18px;" title="${displayName}">${medal}</span>`
                  : `<span class="standings-pos">${s.position}</span>`}
              </td>
              <td>
                <div class="standings-team-cell">
                  <div class="standings-avatar" style="background:${avatarColor};">${initials}</div>
                  <div>
                    <div style="font-weight:600;font-size:14px;">${displayName}</div>
                    ${isClassified ? '<span class="badge-classified">Classificado ✓</span>' : ''}
                  </div>
                </div>
              </td>
              ${(isVball || isTenis)
                ? `<td>${s.games_played ?? s.j ?? 0}</td><td>${s.wins ?? s.v ?? 0}</td><td>${s.losses ?? s.d ?? 0}</td>
                   <td>${s.sets_won ?? 0}</td><td>${s.sets_lost ?? 0}</td>
                   <td>${((s.set_difference ?? s.saldo_sets) ?? 0) >= 0 ? '+' : ''}${(s.set_difference ?? s.saldo_sets) ?? 0}</td>
                   <td>${(s.set_average != null ? s.set_average.toFixed(3) : null) ?? (s.pontos_average != null ? s.pontos_average.toFixed(3) : '—')}</td>
                   <td class="pts-col">${s.points ?? s.pontos ?? 0}</td>`
                : isBball
                  ? `<td>${s.games_played}</td><td>${s.wins}</td><td>${s.losses}</td>
                     <td>${s.goals_for}</td><td>${s.goals_against}</td>
                     <td>${s.goal_diff >= 0 ? '+' : ''}${s.goal_diff}</td>
                     <td class="pts-col">${s.points}</td>`
                  : `<td>${s.games_played}</td><td>${s.wins}</td><td>${s.draws}</td><td>${s.losses}</td>
                     <td>${s.goals_for}</td><td>${s.goals_against}</td>
                     <td>${s.goal_diff >= 0 ? '+' : ''}${s.goal_diff}</td>
                     <td>${s.yellow_cards ?? 0}</td><td>${s.red_cards ?? 0}</td><td>${s.fouls ?? 0}</td>
                     <td class="pts-col" ${ptsTip}>${s.points}</td>`}
            </tr>`}).join('')}
        </tbody>
      </table></div>`;
  }

            <table class="stat-table">

                <th style="width:36px;">#</th><th style="width:40px;"></th><th>Atleta</th><th>Equipe</th>

                <th style="text-align:center;" title="Arremessos 2pts">2pts</th>

                    <td style="text-align:center;">${s.point_2 ?? 0}</td>

    const bestDefense = isFutsal ? (stats.best_defense || []) : [];

      <div class="card" style="margin-top:16px;">
        <div class="card-body" style="padding:0;">
          <div style="padding:12px 16px; font-weight:700; font-size:13px; color:var(--accent-teal); border-bottom:1px solid var(--border);">🛡️ Defesas Menos Vazadas</div>
          <div class="table-responsive">
          <table class="stat-table">
            <thead><tr>
              <th style="width:36px;">#</th><th style="width:40px;"></th><th>Equipe</th>
              <th style="text-align:center;">J</th>
              <th style="text-align:center;">GS</th>
              <th style="text-align:center;">Média</th>
            </tr></thead>
            <tbody>
              ${bestDefense.map((d, i) => `
                <tr style="${i === 0 ? 'background:rgba(0,212,170,0.06);' : ''}">
                  <td style="color:var(--text-secondary); font-weight:700; text-align:center;width:32px;">
                    <span style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:${i===0?'var(--accent-teal)':'var(--bg-tertiary)'};color:${i===0?'#fff':'var(--text-secondary)'};font-size:11px;">${i + 1}</span>
                  </td>
                  <td>${teamAvatar({id: d.team_id, name: d.team_name, logo_url: d.logo_url}, 32)}</td>
                  <td style="font-weight:600;">${d.team_name}${i === 0 ? ' <span style="display:inline-block;padding:2px 6px;border-radius:4px;background:rgba(0,212,170,0.15);color:var(--accent-teal);font-size:10px;font-weight:600;">🛡️ Melhor Defesa</span>' : ''}</td>
                  <td style="text-align:center;">${d.games_played}</td>
                  <td style="text-align:center; font-weight:700; color:var(--accent-teal);">${d.goals_against}</td>
                  <td style="text-align:center; color:var(--text-secondary);">${d.goals_per_game.toFixed(2)}</td>
                </tr>`).join('')}
            </tbody>
          </table>
          </div>
        </div>
      </div>` : `<div style="margin-top:16px; padding:20px; background:var(--bg-secondary); border-radius:8px; text-align:center; color:var(--text-secondary); font-size:13px;">🛡️ Dados de defesa ainda não disponíveis.</div>`) : '';

    if (!scorers.length) {
      el.innerHTML = `<div style="padding:32px; text-align:center; color:var(--text-secondary);">Nenhum gol registrado.</div>${defenseSection}`;

    el.innerHTML = `
      <div class="card">
        <div class="card-body" style="padding:0;">
          <div style="padding:12px 16px; font-weight:700; font-size:13px; color:var(--accent-purple); border-bottom:1px solid var(--border);">⚽ Artilharia — Top ${scorers.length}</div>
          <div class="table-responsive">
          <table class="stat-table">
            <thead><tr><th style="width:36px;">#</th><th style="width:40px;"></th><th>Atleta</th><th>Equipe</th><th style="text-align:center;">Gols</th></tr></thead>
            <tbody>
              ${scorers.map((s, i) => `
                <tr>
                  <td style="color:var(--text-secondary); font-weight:600;">${i + 1}</td>
                  <td>${athleteAvatar({name: s.name, id: s.athlete_id, photo_url: s.photo_url}, 32)}</td>
                  <td style="font-weight:600;">${s.name}</td>
                  <td><div style="display:flex;align-items:center;gap:6px;">${teamAvatar({id: s.team_id, name: s.team_name, logo_url: s.team_logo_url}, 22)}<span style="color:var(--text-secondary);">${s.team_name}</span></div></td>
                  <td style="text-align:center; font-weight:800; color:var(--accent-teal); font-size:16px;">${s.goals}</td>
                </tr>`).join('')}
            </tbody>
          </table>
          </div>
        </div>
      </div>${defenseSection}`;
  }

  // ================================================================
  // ABA: CARTÕES
  // ================================================================

        <div class="card-body" style="padding:0;">

          <div class="table-responsive">
          <table class="stat-table">
            <thead><tr><th style="width:40px;"></th><th>Atleta</th><th>Equipe</th><th style="text-align:center;">🟨</th><th style="text-align:center;">🟥</th><th>Status</th></tr></thead>
            <tbody>
              ${cards.map(c => `
                <tr>

                  <td style="text-align:center; font-weight:700; color:#fbbf24;">${c.yellow}</td>

                    ? '<span class="badge-suspended">Suspenso</span>'
                    : '<span class="badge-free">Livre</span>'}</td>

          </div>

  // ================================================================
  // ABA: JOGOS
  // ================================================================
  async function renderGames(el) {
    const games = await pubFetch(`/api/championships/${currentChamp.id}/games`);
    if (!games || !games.length) {
      el.innerHTML = `<div style="padding:32px; text-align:center; color:var(--text-secondary);">Nenhum jogo cadastrado.</div>`;
      return;
    }

    const grouped = {};
    const order = [];
    const groupGames    = games.filter(g => g.phase === 'groups');
    const knockoutGames = games.filter(g => g.phase === 'knockout');
    const allOrdered = [...groupGames, ...knockoutGames];

    for (const g of allOrdered) {
      const label = g.phase_name || (g.phase === 'groups' ? 'Fase de Grupos' : 'Mata-mata');
      if (!grouped[label]) { grouped[label] = []; order.push(label); }
      grouped[label].push(g);
    }

    let html = '';
    for (const label of order) {
      html += `
        <div class="card" style="margin-bottom:16px;">
          <div style="padding:10px 16px; font-weight:700; font-size:13px; color:var(--accent-purple); text-transform:uppercase; letter-spacing:0.5px; border-bottom:1px solid var(--border);">${label}</div>
          <div class="card-body" style="padding:0;">
            ${grouped[label].map(g => renderGameRow(g)).join('')}
          </div>
        </div>`;
    }
    el.innerHTML = html;
  }

  // ================================================================
  // ABA: RANKING DE CORRIDA (pública)
  // ================================================================
  async function renderPubRaceRanking(el) {
    el.innerHTML = '<div class="page-loading" style="padding:40px;"><div class="spinner"></div><span>Carregando...</span></div>';
    const ranking = await pubFetch(`/api/championships/${currentChamp.id}/race/ranking`);
    const categories = Object.keys(ranking).filter(k => k !== 'overall');
    const tabs = ['overall', ...categories];
    const isPartial = ranking.overall.some(r => !r.position);

    const medalMap = { 1: '🥇', 2: '🥈', 3: '🥉' };

    function rankTable(rows) {
      if (!rows.length) return `<div style="padding:24px; color:var(--text-secondary); text-align:center;">Nenhum resultado registrado ainda.</div>`;
      return `
        <div class="table-responsive"><table class="stat-table">
          <thead><tr><th style="width:50px; text-align:center;">Pos</th><th>Atleta</th><th>Tempo</th></tr></thead>
          <tbody>
            ${rows.map(r => `
              <tr style="${r.position && r.position <= 3 ? 'background:rgba(255,215,0,0.06);' : ''}">
                <td style="text-align:center; font-weight:800; font-size:20px;">${r.position ? (medalMap[r.position] || r.position) : '—'}</td>
                <td style="font-weight:600;">${r.athlete_name || '—'}</td>
                <td style="font-weight:700; color:var(--accent-teal);">${r.finish_time || '—'}</td>
              </tr>`).join('')}
          </tbody>
        </table></div>`;
    }

    const catTabsHtml = tabs.length > 1
      ? `<div class="tab-nav" style="padding:0 16px; margin-bottom:0;">
          ${tabs.map((cat, i) => `<button class="tab-btn ${i===0?'active':''}" onclick="pubRankTab('${cat}', this)">${cat === 'overall' ? 'Geral' : cat}</button>`).join('')}
        </div>`
      : '';

    let tabDivs = tabs.map((cat, i) =>
      `<div id="pub-rank-${cat}" style="display:${i===0?'block':'none'};">${rankTable(ranking[cat] || [])}</div>`
    ).join('');

    // Card de campeão: position=1 no geral
    const champion = ranking.overall.find(r => r.position === 1);
    const championCard = champion ? `
      <div style="margin-bottom:16px; padding:20px 24px; background:linear-gradient(135deg, rgba(255,215,0,0.12), rgba(255,215,0,0.04)); border:1px solid rgba(255,215,0,0.25); border-radius:12px; text-align:center;">
        <div style="font-size:36px; margin-bottom:4px;">🏆</div>
        <div style="font-size:11px; font-weight:700; color:#f59e0b; text-transform:uppercase; letter-spacing:1px; margin-bottom:6px;">Campeão</div>
        <div style="font-size:20px; font-weight:800; color:var(--text-primary);">🏃 ${champion.athlete_name || '—'}</div>
        ${champion.finish_time ? `<div style="font-size:13px; color:var(--accent-teal); margin-top:4px;">${champion.finish_time}</div>` : ''}
      </div>` : '';

    el.innerHTML = `
      ${championCard}
      ${isPartial ? `<div style="padding:12px 16px; margin-bottom:12px; background:rgba(234,179,8,0.08); border:1px solid rgba(234,179,8,0.2); border-radius:8px; font-size:13px; color:#fbbf24;">⚠️ Resultados parciais — corrida ainda não finalizada.</div>` : ''}
      <div class="card">
        <div class="card-body" style="padding:0;">
          <div style="padding:12px 16px; font-weight:700; font-size:14px; color:var(--accent-purple); border-bottom:1px solid var(--border);">
            🏃 Ranking${currentChamp.rules_config?.distance ? ` — ${currentChamp.rules_config.distance}` : ''}
          </div>
          ${catTabsHtml}
          <div style="padding:0;">${tabDivs}</div>
        </div>
      </div>`;
  }

  function pubRankTab(cat, btn) {
    document.querySelectorAll('#pub-tab-race-ranking .tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('[id^="pub-rank-"]').forEach(el => el.style.display = 'none');
    const target = document.getElementById(`pub-rank-${cat}`);
    if (target) target.style.display = 'block';
  }

  function renderGameRow(g) {
    const hs = g.result?.home_score ?? null;
    const as_ = g.result?.away_score ?? null;
    const hasScore = hs !== null && as_ !== null;
    const ht = g.home_team?.name || '—';
    const at = g.away_team?.name || '—';
    const homeWin = hasScore && hs > as_;
    const awayWin = hasScore && as_ > hs;
    const groupLabel = g.extra_data?.group ? ` · Grupo ${g.extra_data.group}` : '';
    const isVball = currentChamp?.sport?.slug === 'volleyball';
    const isBball = currentChamp?.sport?.slug === 'basketball';
    const isTenisGame = currentChamp?.sport?.slug === 'tenis_mesa';
    const isFutsal = currentChamp?.sport?.slug === 'futsal';
    const vballSets = isVball && g.extra_data?.volleyball?.sets;
    const tenisSets = isTenisGame && g.extra_data?.sets;
    const bballData = isBball && g.extra_data?.basketball;
    const setsDetail = vballSets
      ? `<div style="font-size:10px; color:var(--text-secondary); margin-top:3px; white-space:nowrap;">(${vballSets.map(s => `${s.home_points}-${s.away_points}`).join(', ')})</div>`
      : tenisSets
        ? `<div style="font-size:10px; color:var(--text-secondary); margin-top:3px; white-space:nowrap;">(${tenisSets.map(s => `${s.home_points}-${s.away_points}`).join(', ')})</div>`
        : bballData?.quarters
          ? `<div style="font-size:10px; color:var(--text-secondary); margin-top:3px; white-space:nowrap;">(${bballData.quarters.map((q,i) => `${i+1}ºQ: ${q.home_points}-${q.away_points}`).join(' | ')}${bballData.overtime ? ` | Prórr: ${bballData.overtime.home_points}-${bballData.overtime.away_points}` : ''})</div>`
          : '';
    const htSafe = ht.replace(/"/g, '&quot;');
    const atSafe = at.replace(/"/g, '&quot;');
    return `
      <div style="border-bottom:1px solid rgba(255,255,255,0.04);">
        <div class="game-row-pub"${isFutsal ? ` onclick="toggleGameEvents(${g.id})" style="cursor:pointer;"` : ''}>
          <div class="game-teams-pub">
            <div class="game-team-pub" style="${homeWin ? 'color:var(--accent-teal);' : ''}">
              ${teamAvatar(g.home_team || {name:ht,id:g.home_team_id}, 26)}
              <span>${ht}</span>
            </div>
            ${hasScore
              ? `<div style="text-align:center;">
                   <div class="game-score-pub">${hs} – ${as_}</div>
                   ${setsDetail}
                 </div>`
              : `<div class="game-vs-pub">vs</div>`}
            <div class="game-team-pub right" style="${awayWin ? 'color:var(--accent-teal);' : ''}">
              <span>${at}</span>
              ${teamAvatar(g.away_team || {name:at,id:g.away_team_id}, 26)}
            </div>
          </div>
          <div class="game-meta-pub">
            ${isFutsal ? `<div id="game-toggle-${g.id}" style="float:right; font-size:12px; color:var(--text-secondary); margin-left:8px;">▼</div>` : ''}
            ${gameStatusBadge(g.status)}<br>
            ${g.scheduled_at ? `<span>📅 ${fmtDatetime(g.scheduled_at)}</span><br>` : ''}
            ${g.venue ? `<span>📍 ${g.venue}</span><br>` : ''}
            <span style="font-size:10px; color:var(--text-secondary);">${groupLabel}</span>
            ${hasScore && g.result?.created_by_name ? `<span style="font-size:10px; color:var(--text-secondary); display:block; margin-top:3px;">✓ Resultado por ${g.result.created_by_name}</span>` : ''}
          </div>
        </div>

  async function toggleGameEvents(gameId) {
    const panel = document.getElementById('game-events-' + gameId);
    const icon  = document.getElementById('game-toggle-' + gameId);
    if (!panel) return;
    const isOpen = panel.style.display !== 'none';
    if (isOpen) {
      panel.style.display = 'none';
      if (icon) icon.textContent = '▼';
      return;
    }
    panel.style.display = 'block';
    if (icon) icon.textContent = '▲';
    if (eventsCache[gameId] !== undefined) {
      renderGameEventsPanel(panel, eventsCache[gameId]);
      return;
    }
    panel.innerHTML = '<div style="padding:12px; text-align:center;"><div class="spinner" style="display:inline-block;width:16px;height:16px;border-width:2px;vertical-align:middle;"></div></div>';
    try {
      const events = await pubFetch('/api/games/' + gameId + '/events');
      eventsCache[gameId] = events || [];
      renderGameEventsPanel(panel, eventsCache[gameId]);
    } catch (e) {
      panel.innerHTML = '<div style="padding:12px; color:var(--text-secondary); font-size:12px; text-align:center;">Erro ao carregar eventos.</div>';
    }
  }

  function renderGameEventsPanel(panel, events) {
    const homeId   = panel.dataset.homeId ? Number(panel.dataset.homeId) : null;
    const awayId   = panel.dataset.awayId ? Number(panel.dataset.awayId) : null;
    const homeName = panel.dataset.homeName || 'Mandante';
    const awayName = panel.dataset.awayName || 'Visitante';
    const iconMap  = { goal: '⚽', yellow_card: '🟨', red_card: '🟥', foul: '🔴' };
    if (!events.length) {
      panel.innerHTML = '<div style="padding:12px 0; color:var(--text-secondary); font-size:12px; text-align:center;">Nenhum evento registrado</div>';
      return;
    }
    const homeEvts = events.filter(e => homeId && e.team_id === homeId);
    const awayEvts = events.filter(e => awayId && e.team_id === awayId);
    const createdBy = (events.find(e => e.created_by_name) || {}).created_by_name;
    function evtLine(e) {
      const ico  = iconMap[e.event_type] || '•';
      const name = e.athlete_name || e.description || '—';
      const min  = e.minute != null ? ` ${e.minute}'` : '';
      return `<div class="game-event-item">${ico} ${name}${min}</div>`;
    }
    const homeHtml = homeEvts.length
      ? homeEvts.map(evtLine).join('')
      : '<div style="font-size:12px; color:var(--text-secondary); padding:2px 0;">—</div>';
    const awayHtml = awayEvts.length
      ? awayEvts.map(evtLine).join('')
      : '<div style="font-size:12px; color:var(--text-secondary); padding:2px 0; text-align:right;">—</div>';
    panel.innerHTML = `
      <div class="game-events-cols">
        <div class="game-events-col">
          <div class="game-events-col-hdr">${homeName}</div>
          ${homeHtml}
        </div>
        <div class="game-events-col" style="text-align:right;">
          <div class="game-events-col-hdr" style="text-align:right;">${awayName}</div>
          ${awayHtml}
        </div>
      </div>
      ${createdBy ? `<div class="game-events-footer">Registrado por: ${createdBy}</div>` : ''}`;
  }

  function renderPubBgGameCard(g, bgType_) {
    try {
      var scoreDisplay = '';
      if (bgType_ === 'domino') {
        scoreDisplay = g.home_score !== null ? (g.home_score + ' × ' + g.away_score) : 'vs';
      } else if (bgType_ === 'xadrez') {
        var hp = g.home_score !== null ? (g.home_score / 10).toFixed(1) : '—';
        var ap = g.away_score !== null ? (g.away_score / 10).toFixed(1) : '—';
        scoreDisplay = g.home_score !== null ? (hp + ' × ' + ap) : 'vs';
      } else {
        scoreDisplay = g.home_score !== null ? ((g.home_score / 10) + 'pt × ' + (g.away_score / 10) + 'pt') : 'vs';
      }

      var statusBadge = g.status === 'finished'
        ? '<span class="game-status-badge" style="background:rgba(108,99,255,0.15);color:#6c63ff;">Encerrado</span>'
        : '<span class="game-status-badge" style="background:rgba(107,114,128,0.15);color:#9ca3af;">Agendado</span>';

      // Detalhes expandidos (somente leitura)
      var resultDetail = '';
      if (g.status === 'finished') {
        var winner = g.result === 'home_win' ? g.home_name
                   : g.result === 'away_win' ? g.away_name
                   : null;
        if (winner) {
          resultDetail += '<div style="color:var(--accent-teal); font-size:13px; margin-bottom:6px;">✓ ' + winner + ' venceu</div>';
        } else if (g.result === 'draw') {
          resultDetail += '<div style="color:var(--text-secondary); font-size:13px; margin-bottom:6px;">Empate</div>';
        }
        if (bgType_ === 'domino') {
          var events_ = (g.extra_data && g.extra_data.events) || [];
          if (events_.length) {
            var eHtml = '';
            var ei, ev;
            for (ei = 0; ei < events_.length; ei++) {
              ev = events_[ei];
              if (ev.event_type === 'batida') {
                eHtml += '<span style="font-size:11px;background:var(--bg-secondary);border-radius:4px;padding:2px 6px;margin:2px;display:inline-block;">🏆 '
                  + (ev.winner === 'home' ? g.home_name : g.away_name)
                  + ' (' + (ev.match_type || '').replace('_', ' ') + ') +' + ev.points + 'pts</span>';
              } else if (ev.event_type === 'passe') {
                eHtml += '<span style="font-size:11px;background:var(--bg-secondary);border-radius:4px;padding:2px 6px;margin:2px;display:inline-block;">↪ '
                  + (ev.quem_passou === 'home' ? g.home_name : g.away_name)
                  + ' passou +' + ev.points + 'pts</span>';
              }
            }
            if (eHtml) resultDetail += '<div style="display:flex; flex-wrap:wrap; gap:4px;">' + eHtml + '</div>';
          }
        }
      }

      var hasDetail = resultDetail.length > 0;
      var scoreFontSize = scoreDisplay === 'vs' ? 13 : 17;
      var toggleBtn = hasDetail
        ? '<button id="pub-bg-toggle-' + g.id + '" style="background:none;border:none;cursor:pointer;color:var(--text-secondary);font-size:11px;padding:2px 6px;" onclick="event.stopPropagation();togglePubBgCard(' + g.id + ')">▼</button>'
        : '';
      var detailPanel = hasDetail
        ? '<div id="pub-bg-detail-' + g.id + '" style="display:none; border-top:1px solid var(--border); padding:12px 16px;">' + resultDetail + '</div>'
        : '';

      return '<div class="card" style="margin-bottom:8px;">'
        + '<div class="card-body" style="padding:12px 16px; cursor:pointer; user-select:none;" onclick="togglePubBgCard(' + g.id + ')">'
        + '<div style="display:flex; align-items:center; justify-content:space-between; gap:8px;">'
        + '<div style="display:flex; align-items:center; gap:10px; flex:1; min-width:0;">'
        + '<span style="font-weight:700; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:35%;">' + g.home_name + '</span>'
        + '<span style="font-size:' + scoreFontSize + 'px; font-weight:800; color:var(--accent-purple); flex-shrink:0; padding:0 4px;">' + scoreDisplay + '</span>'
        + '<span style="font-weight:700; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:35%;">' + g.away_name + '</span>'
        + '</div>'
        + '<div style="display:flex; align-items:center; gap:6px; flex-shrink:0;">'
        + statusBadge + toggleBtn
        + '</div></div></div>'
        + detailPanel
        + '</div>';
    } catch(e) {
      return '<div class="card" style="margin-bottom:8px; padding:12px; color:var(--text-secondary);">Erro ao exibir jogo.</div>';
    }
  }

  function renderPubTenisMesaGameCard(g) {
    var sets = (g.extra_data && g.extra_data.sets) || [];
    var homeSets = 0, awaySets = 0;
    for (var si = 0; si < sets.length; si++) {
      if (sets[si].home_points > sets[si].away_points) homeSets++;
      else if (sets[si].away_points > sets[si].home_points) awaySets++;
    }
    var scoreDisplay = g.home_score !== null && g.away_score !== null
      ? (g.home_score + ' × ' + g.away_score + ' sets')
      : (sets.length ? homeSets + ' × ' + awaySets + ' sets' : 'vs');
    var statusBadge_ = g.status === 'finished'
      ? '<span class="game-status-badge" style="background:rgba(108,99,255,0.15);color:#6c63ff;">Encerrado</span>'
      : '<span class="game-status-badge" style="background:rgba(107,114,128,0.15);color:#9ca3af;">Agendado</span>';

    var setsDetail = '';
    if (sets.length) {
      setsDetail = sets.map(function(s, i) {
        return '<div style="font-size:12px; color:var(--text-secondary); padding:4px 0; border-bottom:1px solid rgba(255,255,255,0.04);">'
          + '<span style="color:var(--text-secondary);">Set ' + (i + 1) + ':</span> '
          + '<span style="font-weight:700; color:' + (s.home_points > s.away_points ? 'var(--accent-teal)' : 'var(--text-primary)') + ';">' + s.home_points + '</span>'
          + ' × '
          + '<span style="font-weight:700; color:' + (s.away_points > s.home_points ? 'var(--accent-teal)' : 'var(--text-primary)') + ';">' + s.away_points + '</span>'
          + '</div>';
      }).join('');
    }

    var hasDetail = setsDetail.length > 0;
    var toggleBtn = hasDetail
      ? '<button id="pub-tm-toggle-' + g.id + '" style="background:none;border:none;cursor:pointer;color:var(--text-secondary);font-size:11px;padding:2px 6px;" onclick="event.stopPropagation();togglePubTmCard(' + g.id + ')">▼</button>'
      : '';
    var detailPanel = hasDetail
      ? '<div id="pub-tm-detail-' + g.id + '" style="display:none; border-top:1px solid var(--border); padding:10px 16px;">' + setsDetail + '</div>'
      : '';

    return '<div class="card" style="margin-bottom:8px;">'
      + '<div class="card-body" style="padding:12px 16px; cursor:pointer; user-select:none;" onclick="togglePubTmCard(' + g.id + ')">'
      + '<div style="display:flex; align-items:center; justify-content:space-between; gap:8px;">'
      + '<div style="display:flex; align-items:center; gap:10px; flex:1; min-width:0;">'
      + '<span style="font-weight:700; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:35%;">' + (g.home_name || '—') + '</span>'
      + '<span style="font-size:' + (scoreDisplay === 'vs' ? 13 : 15) + 'px; font-weight:800; color:var(--accent-teal); flex-shrink:0; padding:0 4px;">' + scoreDisplay + '</span>'
      + '<span style="font-weight:700; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:35%;">' + (g.away_name || '—') + '</span>'
      + '</div>'
      + '<div style="display:flex; align-items:center; gap:6px; flex-shrink:0;">'
      + statusBadge_ + toggleBtn
      + '</div></div></div>'
      + detailPanel
      + '</div>';
  }

  function togglePubTmCard(gameId) {
    var detail = document.getElementById('pub-tm-detail-' + gameId);
    var btn = document.getElementById('pub-tm-toggle-' + gameId);
    if (!detail) return;
    var isOpen = detail.style.display !== 'none';
    detail.style.display = isOpen ? 'none' : 'block';
    if (btn) btn.textContent = isOpen ? '▼' : '▲';
  }

  function togglePubBgCard(gameId) {
    const detail = document.getElementById(`pub-bg-detail-${gameId}`);
    const btn    = document.getElementById(`pub-bg-toggle-${gameId}`);
    if (!detail) return;
    const isOpen = detail.style.display !== 'none';
    detail.style.display = isOpen ? 'none' : 'block';
    if (btn) btn.textContent = isOpen ? '▼' : '▲';
  }
</script>
</body>
</html>
