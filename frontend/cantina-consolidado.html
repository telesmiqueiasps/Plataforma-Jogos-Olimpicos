<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="img/logo.ico" type="image/x-icon">
  <title>Consolidado — Cantina</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    /* ── Tabs ── */
    .tab-nav { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:20px; border-bottom:1px solid var(--border); padding-bottom:0; }
    .tab-btn { padding:10px 18px; border:none; background:none; color:var(--text-secondary); cursor:pointer; font-size:13px; font-weight:500; border-bottom:2px solid transparent; margin-bottom:-1px; transition:color .15s,border-color .15s; border-radius:0; font-family:inherit; }
    .tab-btn.active { color:var(--accent-purple); border-bottom-color:var(--accent-purple); }

    /* ── Filtro de data ── */
    .date-filter-bar {
      display:flex; align-items:center; gap:10px; flex-wrap:wrap;
      margin-bottom:20px; padding:12px 16px;
      background:var(--bg-card); border:1px solid var(--border);
      border-radius:12px; box-shadow:var(--shadow-sm);
    }
    .date-filter-bar label { font-size:12px; font-weight:600; color:var(--text-secondary); white-space:nowrap; }
    .date-filter-bar select, .date-filter-bar input[type=date] {
      font-size:13px; padding:6px 10px; border:1px solid var(--border);
      border-radius:8px; background:var(--bg-secondary); color:var(--text-primary);
      font-family:inherit; cursor:pointer; outline:none; transition:border-color .15s;
    }
    .date-filter-bar select:focus, .date-filter-bar input[type=date]:focus { border-color:var(--accent-blue); }
    .date-custom-range { display:none; align-items:center; gap:8px; flex-wrap:wrap; }
    .date-custom-range.visible { display:flex; }

    /* ── Grid de colunas de resumo ── */
    .summary-cols {
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:16px;
      margin-bottom:24px;
    }
    @media(max-width:800px){ .summary-cols { grid-template-columns:1fr 1fr; } }
    @media(max-width:540px){ .summary-cols { grid-template-columns:1fr; } }

    .summary-col {
      background:var(--bg-card);
      border:1px solid var(--border);
      border-radius:14px;
      overflow:hidden;
      box-shadow:var(--shadow-sm);
      transition:box-shadow .15s;
    }
    .summary-col:hover { box-shadow:var(--shadow-md); }

    .summary-col-header {
      padding:14px 18px 12px;
      border-bottom:1px solid var(--border);
      display:flex; align-items:center; gap:10px;
    }
    .summary-col-header .col-icon {
      width:36px; height:36px; border-radius:10px;
      display:flex; align-items:center; justify-content:center;
      font-size:18px; flex-shrink:0;
    }
    .summary-col-header .col-title { font-size:14px; font-weight:700; font-family:var(--font-display); }
    .summary-col-header .col-sub { font-size:11px; color:var(--text-muted); margin-top:1px; }

    /* ── Tabela de estoque ── */
    .stock-table { width:100%; border-collapse:collapse; font-size:13px; }
    .stock-table th { padding:10px 12px; text-align:left; font-size:11px; font-weight:700; color:var(--text-secondary); text-transform:uppercase; letter-spacing:.5px; border-bottom:2px solid var(--border); }
    .stock-table td { padding:10px 12px; border-bottom:1px solid var(--border); vertical-align:middle; }
    .stock-table tr:hover td { background:var(--bg-secondary); }
    .stock-table tr.low-stock td { background:#fefce8; }
    .stock-table tr.zero-stock td { background:#fff0f0; }

    /* ── Stock summary pills ── */
    .stock-pills { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px; }
    .stock-pill { display:flex; align-items:center; gap:6px; padding:8px 14px; border-radius:10px; border:1px solid var(--border); background:var(--bg-card); font-size:13px; }
    .stock-pill .pill-val { font-size:18px; font-weight:800; font-family:var(--font-display); }
    .stock-pill .pill-lbl { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.4px; }
    .stock-pill.normal .pill-val { color:#059669; }
    .stock-pill.low    .pill-val { color:#d97706; }
    .stock-pill.empty  .pill-val { color:#dc2626; }

    /* ── Section divider ── */
    .section-divider { display:flex; align-items:center; gap:12px; margin:24px 0 16px; }
    .section-divider-line { flex:1; height:1px; background:var(--border); }
    .section-divider-label { font-size:15px; font-weight:700; font-family:var(--font-display); white-space:nowrap; }

    /* Cores por coluna */
    .summary-col.pdv1 { border-top:3px solid #2563eb; }
    .summary-col.pdv1 .summary-col-header .col-icon { background:rgba(37,99,235,0.12); }
    .summary-col.pdv1 .summary-col-header { background:rgba(37,99,235,0.04); }
    .summary-col.pdv1 .stat-row .stat-value { color:#2563eb; }

    .summary-col.pdv2 { border-top:3px solid #059669; }
    .summary-col.pdv2 .summary-col-header .col-icon { background:rgba(5,150,105,0.12); }
    .summary-col.pdv2 .summary-col-header { background:rgba(5,150,105,0.04); }
    .summary-col.pdv2 .stat-row .stat-value { color:#059669; }

    .summary-col.total { border-top:3px solid var(--accent-purple); }
    .summary-col.total .summary-col-header .col-icon { background:rgba(124,58,237,0.12); }
    .summary-col.total .summary-col-header { background:rgba(124,58,237,0.04); }
    .summary-col.total .stat-row .stat-value { color:var(--accent-purple); }

    /* Linhas de estatísticas */
    .stat-list { padding:10px 0 6px; }
    .stat-row {
      display:flex; align-items:center; justify-content:space-between;
      padding:8px 18px; gap:8px; transition:background .12s;
    }
    .stat-row:hover { background:var(--bg-secondary); }
    .stat-row + .stat-row { border-top:1px solid var(--border-light); }
    .stat-row-left { display:flex; align-items:center; gap:8px; }
    .stat-row .stat-icon {
      width:28px; height:28px; border-radius:8px;
      display:flex; align-items:center; justify-content:center;
      font-size:14px; background:var(--bg-secondary); flex-shrink:0;
    }
    .stat-row .stat-label { font-size:12px; color:var(--text-secondary); font-weight:500; }
    .stat-row .stat-value { font-size:14px; font-weight:800; font-family:var(--font-display); }
    .stat-row.highlight { background:var(--bg-secondary); }
    .stat-row.highlight .stat-value { font-size:16px; }

    /* ── Seção de pedidos ── */
    .orders-header {
      display:flex; align-items:center; justify-content:space-between;
      flex-wrap:wrap; gap:8px; margin-bottom:12px;
    }
    .orders-header-title { font-size:15px; font-weight:700; font-family:var(--font-display); }
    .orders-count-badge {
      background:var(--bg-secondary); border:1px solid var(--border);
      border-radius:20px; padding:3px 10px; font-size:12px;
      color:var(--text-secondary); font-weight:600;
    }

    /* ── Order cards ── */
    .order-card {
      background:var(--bg-card); border:1px solid var(--border);
      border-radius:10px; padding:12px 16px; margin-bottom:8px;
      transition:box-shadow .15s, transform .15s;
    }
    .order-card:hover { box-shadow:var(--shadow-sm); }
    .order-card.refunded { border-color:#fca5a5; background:rgba(252,165,165,0.04); }
    .order-card.cancelled { border-color:#fcd34d; background:rgba(252,211,77,0.04); }

    .order-card-top {
      display:flex; align-items:center; justify-content:space-between;
      flex-wrap:wrap; gap:6px; margin-bottom:6px;
    }
    .order-num {
      font-weight:800; font-size:14px; font-family:var(--font-display);
      color:var(--accent-blue);
    }
    .order-badges { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
    .order-card-items {
      font-size:12px; color:var(--text-secondary);
      margin-bottom:6px; line-height:1.5;
    }
    .order-card-bottom {
      display:flex; align-items:center; justify-content:space-between;
      flex-wrap:wrap; gap:4px;
    }
    .order-total { font-weight:800; font-size:15px; font-family:var(--font-display); }
    .order-meta { font-size:11px; color:var(--text-muted); }
    .order-payment {
      font-size:11px; font-weight:600; padding:2px 8px;
      border-radius:20px; background:var(--bg-secondary);
      color:var(--text-secondary); border:1px solid var(--border);
    }

    /* Badges */
    .badge-pdv1 { background:rgba(37,99,235,0.12); color:#2563eb; border-radius:6px; padding:2px 8px; font-size:11px; font-weight:700; }
    .badge-pdv2 { background:rgba(5,150,105,0.12); color:#059669; border-radius:6px; padding:2px 8px; font-size:11px; font-weight:700; }
    .badge-paid { background:#d1fae5; color:#065f46; border-radius:20px; padding:3px 10px; font-size:11px; font-weight:600; }
    .badge-pending { background:#fef3c7; color:#92400e; border-radius:20px; padding:3px 10px; font-size:11px; font-weight:600; }
    .badge-cancelled { background:#fef9c3; color:#78350f; border-radius:20px; padding:3px 10px; font-size:11px; font-weight:600; }
    .badge-refunded { background:#fee2e2; color:#991b1b; border-radius:20px; padding:3px 10px; font-size:11px; font-weight:700; }

    /* Divider de PDV na lista de pedidos */
    .orders-pdv-divider {
      display:flex; align-items:center; gap:10px; margin:16px 0 10px;
    }
    .orders-pdv-divider-line { flex:1; height:1px; background:var(--border); }
    .orders-pdv-divider-label {
      font-size:11px; font-weight:700; text-transform:uppercase;
      letter-spacing:.5px; color:var(--text-muted);
      white-space:nowrap;
    }

    /* ── PDF export ── */
    #pdf-content {
      display:none;
      font-family:'Inter',sans-serif;
      background:#fff;
      color:#1a1d2e;
      padding:32px;
      width:794px; /* A4 width in px at 96dpi */
    }
    #pdf-content.rendering { display:block !important; }

    .pdf-header {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:24px; padding-bottom:16px;
      border-bottom:2px solid #e2e6ef;
    }
    .pdf-title { font-size:20px; font-weight:800; color:#1a1d2e; font-family:'Outfit',sans-serif; }
    .pdf-subtitle { font-size:12px; color:#8b92a9; margin-top:2px; }
    .pdf-date { font-size:12px; color:#4a5068; text-align:right; }

    .pdf-section-title {
      font-size:13px; font-weight:700; text-transform:uppercase;
      letter-spacing:.5px; color:#7c3aed;
      padding-bottom:8px; border-bottom:2px solid #7c3aed;
      margin-bottom:14px; font-family:'Outfit',sans-serif;
    }

    .pdf-cols { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-bottom:24px; }
    .pdf-col {
      border:1px solid #e2e6ef; border-radius:10px; overflow:hidden;
    }
    .pdf-col.pdv1 { border-top:3px solid #2563eb; }
    .pdf-col.pdv2 { border-top:3px solid #059669; }
    .pdf-col.total { border-top:3px solid #7c3aed; }

    .pdf-col-head {
      padding:10px 14px; font-size:13px; font-weight:700;
      font-family:'Outfit',sans-serif;
      border-bottom:1px solid #e2e6ef;
    }
    .pdf-col.pdv1 .pdf-col-head { background:#eff6ff; color:#2563eb; }
    .pdf-col.pdv2 .pdf-col-head { background:#ecfdf5; color:#059669; }
    .pdf-col.total .pdf-col-head { background:#f5f3ff; color:#7c3aed; }

    .pdf-stat { display:flex; justify-content:space-between; padding:7px 14px; font-size:12px; }
    .pdf-stat + .pdf-stat { border-top:1px solid #f0f2f7; }
    .pdf-stat-label { color:#4a5068; }
    .pdf-stat-value { font-weight:700; color:#1a1d2e; }
    .pdf-stat.highlight { background:#f8f9fc; }
    .pdf-stat.highlight .pdf-stat-value { font-size:14px; color:inherit; }
    .pdf-col.pdv1 .pdf-stat.highlight .pdf-stat-value { color:#2563eb; }
    .pdf-col.pdv2 .pdf-stat.highlight .pdf-stat-value { color:#059669; }
    .pdf-col.total .pdf-stat.highlight .pdf-stat-value { color:#7c3aed; }

    .pdf-orders-table { width:100%; border-collapse:collapse; font-size:11px; }
    .pdf-orders-table th {
      background:#f8f9fc; padding:8px 10px; text-align:left;
      font-weight:700; font-size:10px; text-transform:uppercase;
      letter-spacing:.4px; color:#4a5068;
      border-bottom:2px solid #e2e6ef;
    }
    .pdf-orders-table td { padding:8px 10px; border-bottom:1px solid #f0f2f7; vertical-align:middle; }
    .pdf-orders-table tr:last-child td { border-bottom:none; }
    .pdf-orders-table tr.refunded td { background:#fff5f5; }
    .pdf-orders-table tr.cancelled td { background:#fefce8; }

    .pdf-badge {
      display:inline-block; border-radius:4px; padding:2px 6px;
      font-size:10px; font-weight:700;
    }
    .pdf-badge-pdv1 { background:#dbeafe; color:#1d4ed8; }
    .pdf-badge-pdv2 { background:#d1fae5; color:#065f46; }
    .pdf-badge-paid { background:#d1fae5; color:#065f46; }
    .pdf-badge-pending { background:#fef3c7; color:#92400e; }
    .pdf-badge-cancelled { background:#fef9c3; color:#78350f; }
    .pdf-badge-refunded { background:#fee2e2; color:#991b1b; }

    .pdf-footer {
      margin-top:24px; padding-top:12px; border-top:1px solid #e2e6ef;
      display:flex; justify-content:space-between; align-items:center;
      font-size:10px; color:#8b92a9;
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <a href="cantina-select.html" class="sidebar-logo">
          <img src="img/logo.png" alt="Logo" style="width:50px;height:50px;object-fit:contain;flex-shrink:0;">
          <span>Jogos Olímpicos<br>Sinodal PB</span>
        </a>
      </div>
      <nav class="sidebar-nav">
        <span class="nav-section-label">Cantina</span>
        <a href="cantina-select.html" class="nav-item">
          <span class="nav-icon">🔀</span><span>Trocar PDV</span>
        </a>
        <a href="cantina.html?pdv=1" class="nav-item">
          <span class="nav-icon">🏪</span><span>PDV 1</span>
        </a>
        <a href="cantina.html?pdv=2" class="nav-item">
          <span class="nav-icon">🏪</span><span>PDV 2</span>
        </a>
        <a href="cantina-consolidado.html" class="nav-item active">
          <span class="nav-icon">📊</span><span>Consolidado</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="user-avatar">U</div>
          <div>
            <div class="user-name" id="user-name">Usuário</div>
            <div class="user-role" id="user-role">Admin</div>
          </div>
        </div>
        <button id="logout-btn" class="btn btn-ghost btn-sm" style="width:100%;margin-top:8px;justify-content:center;">Sair</button>
      </div>
    </aside>

    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <div class="main-wrapper">
      <header class="topbar">
        <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Menu">&#9776;</button>
        <span class="topbar-title">📊 Cantina — Consolidado</span>
        <div class="topbar-actions">
          <a href="cantina-select.html" class="btn btn-secondary btn-sm">← Trocar PDV</a>
          <button class="btn btn-primary btn-sm" onclick="exportPDF()">📄 Exportar PDF</button>
        </div>
      </header>

      <main class="content" id="main-content">
        <!-- Filtro de período -->
        <div class="date-filter-bar">
          <label>📅 Período:</label>
          <select id="date-period" onchange="onDatePeriodChange()">
            <option value="today">Hoje</option>
            <option value="yesterday">Ontem</option>
            <option value="last7">Últimos 7 dias</option>
            <option value="month">Este mês</option>
            <option value="custom">Período personalizado</option>
            <option value="all">Tudo</option>
          </select>
          <div class="date-custom-range" id="date-custom-range">
            <span style="font-size:12px;color:var(--text-secondary);">De:</span>
            <input type="date" id="date-from" style="width:140px;">
            <span style="font-size:12px;color:var(--text-secondary);">Até:</span>
            <input type="date" id="date-to" style="width:140px;">
            <button class="btn btn-primary btn-sm" onclick="loadConsolidado()">Aplicar</button>
          </div>
        </div>

        <div id="summary-section"></div>
        <div id="orders-section"></div>
        <div id="stock-section"></div>
      </main>
    </div>
  </div>

  <!-- Área oculta usada APENAS para renderizar o PDF -->
  <div id="pdf-content"></div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Dados globais para reutilização no PDF
    var _lastS1 = null, _lastS2 = null, _lastConsol = null;
    var _lastOrders1 = [], _lastOrders2 = [];
    var _lastProds1 = [], _lastProds2 = [];

    document.addEventListener('DOMContentLoaded', function() {
      requireAdminAccess();
      loadConsolidado();
    });

    function onDatePeriodChange() {
      var period = document.getElementById('date-period').value;
      var customRange = document.getElementById('date-custom-range');
      if (period === 'custom') {
        customRange.classList.add('visible');
      } else {
        customRange.classList.remove('visible');
        loadConsolidado();
      }
    }

    function getDateParams() {
      var period = document.getElementById('date-period').value;
      var today = new Date();
      var fmt = function(d) {
        var m = d.getMonth()+1, day = d.getDate();
        return d.getFullYear()+'-'+(m<10?'0'+m:m)+'-'+(day<10?'0'+day:day);
      };
      if (period === 'today') { var s = fmt(today); return { date_from: s, date_to: s }; }
      if (period === 'yesterday') { var y = new Date(today); y.setDate(y.getDate()-1); var s2 = fmt(y); return { date_from: s2, date_to: s2 }; }
      if (period === 'last7') { var d7 = new Date(today); d7.setDate(d7.getDate()-6); return { date_from: fmt(d7), date_to: fmt(today) }; }
      if (period === 'month') { var first = new Date(today.getFullYear(), today.getMonth(), 1); return { date_from: fmt(first), date_to: fmt(today) }; }
      if (period === 'custom') {
        var df = document.getElementById('date-from').value;
        var dt = document.getElementById('date-to').value;
        var params = {};
        if (df) params.date_from = df;
        if (dt) params.date_to = dt;
        return Object.keys(params).length ? params : null;
      }
      return null;
    }

    function getPeriodLabel() {
      var period = document.getElementById('date-period').value;
      var labels = { today:'Hoje', yesterday:'Ontem', last7:'Últimos 7 dias', month:'Este mês', all:'Todo o período', custom:'Período personalizado' };
      if (period === 'custom') {
        var df = document.getElementById('date-from').value;
        var dt = document.getElementById('date-to').value;
        if (df && dt) return df + ' até ' + dt;
      }
      return labels[period] || period;
    }

    async function loadConsolidado() {
      var dateParams = getDateParams();
      var summaryEl = document.getElementById('summary-section');
      var ordersEl = document.getElementById('orders-section');
      summaryEl.innerHTML = '<div class="page-loading"><div class="spinner"></div><span>Carregando...</span></div>';
      ordersEl.innerHTML = '';
      try {
        var [consol, orders1, orders2, prods1, prods2] = await Promise.all([
          CantinAPI.cash(Object.assign({}, dateParams || {})),
          CantinAPI.orders(Object.assign({}, dateParams || {}, { pdv_id: 1 })),
          CantinAPI.orders(Object.assign({}, dateParams || {}, { pdv_id: 2 })),
          CantinAPI.products({ pdv_id: 1 }),
          CantinAPI.products({ pdv_id: 2 }),
        ]);
        _lastOrders1 = orders1;
        _lastOrders2 = orders2;
        _lastConsol = consol;
        _lastProds1 = prods1 || [];
        _lastProds2 = prods2 || [];
        renderSummary(consol, orders1, orders2);
        renderOrders(orders1, orders2);
        renderStock(_lastProds1, _lastProds2);
      } catch(e) {
        summaryEl.innerHTML = '<p style="color:var(--text-muted);">Erro ao carregar: ' + e.message + '</p>';
      }
    }

    // ── Resumo por coluna ──────────────────────────────────────────────

    function summaryColHtml(s, title, icon, colClass) {
      var paidPct = s.orders_count > 0 ? Math.round((s.orders_paid / s.orders_count) * 100) : 0;
      var estornoRow = '';
      if ((s.total_refunded||0) > 0 || (s.orders_refunded||0) > 0) {
        estornoRow = '<div class="stat-row">' +
          '<div class="stat-row-left">' +
            '<div class="stat-icon">↩️</div>' +
            '<span class="stat-label">Estornos (' + (s.orders_refunded||0) + ')</span>' +
          '</div>' +
          '<span class="stat-value" style="color:#dc2626;">- R$ ' + formatMoney(s.total_refunded||0) + '</span>' +
        '</div>';
      }
      return '<div class="summary-col ' + colClass + '">' +
        '<div class="summary-col-header">' +
          '<div class="col-icon">' + icon + '</div>' +
          '<div>' +
            '<div class="col-title">' + title + '</div>' +
            '<div class="col-sub">' + (s.orders_paid||0) + ' pagos de ' + (s.orders_count||0) + ' pedidos (' + paidPct + '%)</div>' +
          '</div>' +
        '</div>' +
        '<div class="stat-list">' +
          statRow('💵', 'Dinheiro', 'R$ ' + formatMoney(s.total_dinheiro||0), '') +
          statRow('📱', 'PIX', 'R$ ' + formatMoney(s.total_pix||0), '') +
          statRow('🛒', 'Total Vendas', 'R$ ' + formatMoney(s.total_vendas||0), 'highlight') +
          estornoRow +
          statRow('💰', 'Saldo', 'R$ ' + formatMoney(s.saldo||0), '') +
        '</div>' +
      '</div>';
    }

    function statRow(icon, label, value, extra) {
      return '<div class="stat-row' + (extra ? ' ' + extra : '') + '">' +
        '<div class="stat-row-left">' +
          '<div class="stat-icon">' + icon + '</div>' +
          '<span class="stat-label">' + label + '</span>' +
        '</div>' +
        '<span class="stat-value">' + value + '</span>' +
      '</div>';
    }

    async function renderSummary(consol, orders1, orders2) {
      var dateParams = getDateParams();
      var [s1, s2] = await Promise.all([
        CantinAPI.cash(Object.assign({}, dateParams || {}, { pdv_id: 1 })),
        CantinAPI.cash(Object.assign({}, dateParams || {}, { pdv_id: 2 })),
      ]);
      _lastS1 = s1;
      _lastS2 = s2;
      document.getElementById('summary-section').innerHTML =
        '<div class="summary-cols">' +
          summaryColHtml(s1, 'PDV 1', '🏪', 'pdv1') +
          summaryColHtml(s2, 'PDV 2', '🏪', 'pdv2') +
          summaryColHtml(consol, 'Total Consolidado', '📊', 'total') +
        '</div>';
    }

    // ── Lista de pedidos ───────────────────────────────────────────────

    function renderOrders(orders1, orders2) {
      var el = document.getElementById('orders-section');
      var all = orders1.map(function(o){ return Object.assign({}, o, {_pdv:1}); })
        .concat(orders2.map(function(o){ return Object.assign({}, o, {_pdv:2}); }))
        .sort(function(a,b){ return b.id - a.id; });

      if (!all.length) {
        el.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:24px;">Nenhum pedido no período.</p>';
        return;
      }

      var html = '<div class="card">' +
        '<div class="card-header">' +
          '<span class="card-title">📋 Todos os Pedidos</span>' +
          '<span class="orders-count-badge">' + all.length + ' pedidos</span>' +
        '</div>' +
        '<div class="card-body" style="padding:16px;">';

      all.forEach(function(o) {
        var badgeClass, badgeLabel;
        if (o.status === 'paid')           { badgeClass='badge-paid';      badgeLabel='Pago'; }
        else if (o.status === 'cancelled') { badgeClass='badge-cancelled'; badgeLabel='Cancelado'; }
        else if (o.status === 'refunded')  { badgeClass='badge-refunded';  badgeLabel='Estornado'; }
        else                               { badgeClass='badge-pending';   badgeLabel='Pendente'; }

        var cardClass = 'order-card';
        if (o.status === 'refunded') cardClass += ' refunded';
        else if (o.status === 'cancelled') cardClass += ' cancelled';

        var pdvBadge = o._pdv === 1
          ? '<span class="badge-pdv1">PDV 1</span>'
          : '<span class="badge-pdv2">PDV 2</span>';

        var itemsText = (o.items||[]).map(function(i){ return i.quantity+'× '+i.product_name; }).join(' · ');

        var paymentLabel = '';
        if (o.payment_method === 'dinheiro' || o.payment_method === 'cash') paymentLabel = '💵 Dinheiro';
        else if (o.payment_method === 'pix') paymentLabel = '📱 PIX';
        else if (o.payment_method) paymentLabel = o.payment_method;

        html += '<div class="' + cardClass + '">' +
          '<div class="order-card-top">' +
            '<span class="order-num">#' + o.order_number + '</span>' +
            '<div class="order-badges">' +
              pdvBadge +
              '<span class="' + badgeClass + '">' + badgeLabel + '</span>' +
              (paymentLabel ? '<span class="order-payment">' + paymentLabel + '</span>' : '') +
            '</div>' +
          '</div>' +
          '<div class="order-card-items">' + escHtml(itemsText||'Sem itens') + '</div>' +
          '<div class="order-card-bottom">' +
            '<span class="order-total">R$ ' + formatMoney(o.total) + '</span>' +
            '<span class="order-meta">' + fmtDatetime(o.created_at) + '</span>' +
          '</div>' +
        '</div>';
      });

      html += '</div></div>';
      el.innerHTML = html;
    }

    // ── Estoque ────────────────────────────────────────────────────────

    function renderStock(prods1, prods2) {
      var el = document.getElementById('stock-section');

      function statsFor(prods) {
        return {
          total:  prods.length,
          normal: prods.filter(function(p){ return p.stock > p.min_stock; }).length,
          low:    prods.filter(function(p){ return p.stock > 0 && p.stock <= p.min_stock; }).length,
          empty:  prods.filter(function(p){ return p.stock === 0; }).length,
        };
      }

      function pill(icon, val, lbl, cls) {
        return '<div class="stock-pill ' + cls + '">' +
          '<span style="font-size:20px;">' + icon + '</span>' +
          '<div><div class="pill-val">' + val + '</div><div class="pill-lbl">' + lbl + '</div></div>' +
        '</div>';
      }

      function stockTable(prods, pdvId) {
        if (!prods.length) return '<p style="color:var(--text-muted);text-align:center;padding:16px;">Nenhum produto cadastrado.</p>';

        var sorted = prods.slice().sort(function(a, b) {
          var ra = a.stock === 0 ? 0 : (a.stock <= a.min_stock ? 1 : 2);
          var rb = b.stock === 0 ? 0 : (b.stock <= b.min_stock ? 1 : 2);
          return ra - rb || a.name.localeCompare(b.name);
        });

        var rows = sorted.map(function(p) {
          var rowClass = p.stock === 0 ? 'zero-stock' : (p.stock <= p.min_stock ? 'low-stock' : '');
          var statusBadge;
          if (p.stock === 0)
            statusBadge = '<span class="badge-cancelled" style="border-radius:20px;font-size:11px;">Sem Estoque</span>';
          else if (p.stock <= p.min_stock)
            statusBadge = '<span class="badge-pending" style="border-radius:20px;font-size:11px;">⚠️ Baixo</span>';
          else
            statusBadge = '<span class="badge-paid" style="border-radius:20px;font-size:11px;">Normal</span>';

          return '<tr class="' + rowClass + '">' +
            '<td style="font-weight:600;">' + escHtml(p.name) + '</td>' +
            '<td><span style="background:var(--bg-tertiary,#f0f2f7);padding:2px 8px;border-radius:10px;font-size:11px;">' + escHtml(p.category || '—') + '</span></td>' +
            '<td style="text-align:right;font-weight:700;">R$ ' + formatMoney(p.price) + '</td>' +
            '<td style="text-align:center;font-weight:800;color:' + (p.stock === 0 ? '#dc2626' : p.stock <= p.min_stock ? '#d97706' : 'inherit') + ';">' + p.stock + '</td>' +
            '<td style="text-align:center;color:var(--text-muted);">' + p.min_stock + '</td>' +
            '<td style="text-align:center;">' + statusBadge + '</td>' +
            '</tr>';
        }).join('');

        return '<table class="stock-table"><thead><tr>' +
          '<th>Produto</th><th>Categoria</th>' +
          '<th style="text-align:right;">Preço</th>' +
          '<th style="text-align:center;">Estoque Atual</th>' +
          '<th style="text-align:center;">Mínimo</th>' +
          '<th style="text-align:center;">Status</th>' +
          '</tr></thead><tbody>' + rows + '</tbody></table>';
      }

      var st1 = statsFor(prods1);
      var st2 = statsFor(prods2);
      var stAll = {
        total:  st1.total  + st2.total,
        normal: st1.normal + st2.normal,
        low:    st1.low    + st2.low,
        empty:  st1.empty  + st2.empty,
      };

      var html = '<div class="section-divider"><div class="section-divider-line"></div>' +
        '<span class="section-divider-label">📦 Estoque de Produtos</span>' +
        '<div class="section-divider-line"></div></div>';

      // Pills do consolidado
      html += '<div class="stock-pills">' +
        pill('📦', stAll.total,  'Total',       '') +
        pill('✅', stAll.normal, 'Normal',       'normal') +
        pill('⚠️', stAll.low,    'Estoque Baixo','low') +
        pill('❌', stAll.empty,  'Sem Estoque',  stAll.empty > 0 ? 'empty' : '') +
      '</div>';

      // PDV 1
      html += '<div class="card" style="margin-bottom:16px;">' +
        '<div class="card-header" style="background:rgba(37,99,235,0.04);border-top:3px solid #2563eb;">' +
          '<span class="card-title" style="color:#2563eb;">🏪 PDV 1</span>' +
          '<span style="font-size:12px;color:var(--text-muted);">' + st1.total + ' produtos' +
            (st1.empty ? ' · <span style="color:#dc2626;font-weight:700;">' + st1.empty + ' sem estoque</span>' : '') +
            (st1.low   ? ' · <span style="color:#d97706;font-weight:700;">' + st1.low + ' baixo</span>' : '') +
          '</span>' +
        '</div>' +
        '<div class="card-body" style="padding:0;"><div class="table-wrapper">' + stockTable(prods1, 1) + '</div></div>' +
      '</div>';

      // PDV 2
      html += '<div class="card" style="margin-bottom:16px;">' +
        '<div class="card-header" style="background:rgba(5,150,105,0.04);border-top:3px solid #059669;">' +
          '<span class="card-title" style="color:#059669;">🏪 PDV 2</span>' +
          '<span style="font-size:12px;color:var(--text-muted);">' + st2.total + ' produtos' +
            (st2.empty ? ' · <span style="color:#dc2626;font-weight:700;">' + st2.empty + ' sem estoque</span>' : '') +
            (st2.low   ? ' · <span style="color:#d97706;font-weight:700;">' + st2.low + ' baixo</span>' : '') +
          '</span>' +
        '</div>' +
        '<div class="card-body" style="padding:0;"><div class="table-wrapper">' + stockTable(prods2, 2) + '</div></div>' +
      '</div>';

      el.innerHTML = html;
    }

    // ── Exportar PDF ───────────────────────────────────────────────────

    async function exportPDF() {
      showToast('Gerando PDF...', 'info', 4000);
      try {
        var pdfEl = document.getElementById('pdf-content');
        var now = new Date();
        var periodLabel = getPeriodLabel();
        var dateStr = now.toLocaleDateString('pt-BR') + ' às ' + now.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});

        // Gerar HTML do PDF
        pdfEl.innerHTML = buildPdfHtml(_lastS1, _lastS2, _lastConsol, _lastOrders1, _lastOrders2, _lastProds1, _lastProds2, periodLabel, dateStr);
        pdfEl.classList.add('rendering');

        // Aguardar render
        await new Promise(function(r){ setTimeout(r, 150); });

        var canvas = await html2canvas(pdfEl, {
          scale: 2,
          useCORS: true,
          backgroundColor: '#ffffff',
          logging: false,
          windowWidth: 794,
        });

        pdfEl.classList.remove('rendering');
        pdfEl.innerHTML = '';

        var imgData = canvas.toDataURL('image/png');
        var pdf = new jspdf.jsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });
        var pdfWidth = pdf.internal.pageSize.getWidth();
        var pdfHeight = pdf.internal.pageSize.getHeight();
        var ratio = pdfWidth / canvas.width;
        var imgHeight = canvas.height * ratio;
        var position = 0;

        while (position < imgHeight) {
          if (position > 0) pdf.addPage();
          pdf.addImage(imgData, 'PNG', 0, -position, pdfWidth, imgHeight);
          position += pdfHeight;
        }

        pdf.save('consolidado-cantina-' + now.toISOString().slice(0,10) + '.pdf');
        showToast('PDF exportado com sucesso!', 'success');
      } catch(e) {
        document.getElementById('pdf-content').classList.remove('rendering');
        document.getElementById('pdf-content').innerHTML = '';
        showToast('Erro ao exportar: ' + e.message, 'error');
      }
    }

    function buildPdfHtml(s1, s2, consol, orders1, orders2, prods1, prods2, periodLabel, dateStr) {
      var all = (orders1||[]).map(function(o){ return Object.assign({},o,{_pdv:1}); })
        .concat((orders2||[]).map(function(o){ return Object.assign({},o,{_pdv:2}); }))
        .sort(function(a,b){ return b.id - a.id; });

      var html = '<div class="pdf-header">' +
        '<div>' +
          '<div class="pdf-title">📊 Consolidado — Cantina</div>' +
          '<div class="pdf-subtitle">Jogos Olímpicos Sinodal PB</div>' +
        '</div>' +
        '<div class="pdf-date">' +
          '<div style="font-weight:700;color:#1a1d2e;">Período: ' + escHtml(periodLabel) + '</div>' +
          '<div style="margin-top:2px;">Emitido em ' + escHtml(dateStr) + '</div>' +
        '</div>' +
      '</div>';

      // Resumo financeiro
      html += '<div class="pdf-section-title">Resumo Financeiro</div>';
      html += '<div class="pdf-cols">' +
        buildPdfCol(s1, 'PDV 1', 'pdv1') +
        buildPdfCol(s2, 'PDV 2', 'pdv2') +
        buildPdfCol(consol, 'Total Consolidado', 'total') +
      '</div>';

      // Tabela de pedidos
      if (all.length) {
        html += '<div class="pdf-section-title" style="margin-top:8px;">Pedidos (' + all.length + ')</div>';
        html += '<table class="pdf-orders-table"><thead><tr>' +
          '<th>#</th><th>PDV</th><th>Itens</th><th>Status</th><th>Pagamento</th><th style="text-align:right;">Total</th><th>Data</th>' +
        '</tr></thead><tbody>';

        all.forEach(function(o) {
          var rowClass = o.status === 'refunded' ? 'refunded' : (o.status === 'cancelled' ? 'cancelled' : '');
          var statusBadge, statusClass;
          if (o.status === 'paid')           { statusBadge='Pago';      statusClass='paid'; }
          else if (o.status === 'cancelled') { statusBadge='Cancelado'; statusClass='cancelled'; }
          else if (o.status === 'refunded')  { statusBadge='Estornado'; statusClass='refunded'; }
          else                               { statusBadge='Pendente';  statusClass='pending'; }

          var itemsText = (o.items||[]).map(function(i){ return i.quantity+'× '+i.product_name; }).join(', ');
          var payLabel = '';
          if (o.payment_method === 'dinheiro' || o.payment_method === 'cash') payLabel = 'Dinheiro';
          else if (o.payment_method === 'pix') payLabel = 'PIX';
          else if (o.payment_method) payLabel = o.payment_method;

          html += '<tr class="' + rowClass + '">' +
            '<td style="font-weight:700;color:#2563eb;">#' + escHtml(String(o.order_number)) + '</td>' +
            '<td><span class="pdf-badge pdf-badge-pdv' + o._pdv + '">PDV ' + o._pdv + '</span></td>' +
            '<td style="max-width:220px;color:#4a5068;">' + escHtml(itemsText||'—') + '</td>' +
            '<td><span class="pdf-badge pdf-badge-' + statusClass + '">' + statusBadge + '</span></td>' +
            '<td style="color:#4a5068;">' + escHtml(payLabel||'—') + '</td>' +
            '<td style="text-align:right;font-weight:700;">R$ ' + formatMoney(o.total) + '</td>' +
            '<td style="color:#8b92a9;white-space:nowrap;">' + fmtDatetime(o.created_at) + '</td>' +
          '</tr>';
        });

        html += '</tbody></table>';
      } else {
        html += '<p style="color:#8b92a9;text-align:center;padding:16px;">Nenhum pedido no período.</p>';
      }

      // Tabela de estoque por PDV
      function pdfStockTable(prods, title, headerColor) {
        if (!prods || !prods.length) return '';
        var sorted = prods.slice().sort(function(a, b) {
          var ra = a.stock === 0 ? 0 : (a.stock <= a.min_stock ? 1 : 2);
          var rb = b.stock === 0 ? 0 : (b.stock <= b.min_stock ? 1 : 2);
          return ra - rb || a.name.localeCompare(b.name);
        });
        var rows = sorted.map(function(p) {
          var rowStyle = p.stock === 0 ? 'background:#fff0f0;' : (p.stock <= p.min_stock ? 'background:#fffbeb;' : '');
          var status = p.stock === 0
            ? '<span class="pdf-badge pdf-badge-refunded">Sem Estoque</span>'
            : p.stock <= p.min_stock
              ? '<span class="pdf-badge pdf-badge-pending">⚠️ Baixo</span>'
              : '<span class="pdf-badge pdf-badge-paid">Normal</span>';
          return '<tr style="' + rowStyle + '">' +
            '<td style="font-weight:600;">' + escHtml(p.name) + '</td>' +
            '<td style="color:#4a5068;">' + escHtml(p.category || '—') + '</td>' +
            '<td style="text-align:right;">R$ ' + formatMoney(p.price) + '</td>' +
            '<td style="text-align:center;font-weight:800;color:' + (p.stock === 0 ? '#dc2626' : p.stock <= p.min_stock ? '#d97706' : '#1a1d2e') + ';">' + p.stock + '</td>' +
            '<td style="text-align:center;color:#8b92a9;">' + p.min_stock + '</td>' +
            '<td style="text-align:center;">' + status + '</td>' +
            '</tr>';
        }).join('');

        var emptyCount = prods.filter(function(p){ return p.stock === 0; }).length;
        var lowCount   = prods.filter(function(p){ return p.stock > 0 && p.stock <= p.min_stock; }).length;

        return '<div style="font-size:12px;font-weight:700;color:' + headerColor + ';padding:6px 0 4px;margin-top:10px;">' + title + ' — ' + prods.length + ' produtos' +
          (emptyCount ? ' &nbsp;·&nbsp; <span style="color:#dc2626;">' + emptyCount + ' sem estoque</span>' : '') +
          (lowCount   ? ' &nbsp;·&nbsp; <span style="color:#d97706;">' + lowCount + ' estoque baixo</span>' : '') +
          '</div>' +
          '<table class="pdf-orders-table">' +
          '<thead><tr><th>Produto</th><th>Categoria</th><th style="text-align:right;">Preço</th><th style="text-align:center;">Atual</th><th style="text-align:center;">Mínimo</th><th style="text-align:center;">Status</th></tr></thead>' +
          '<tbody>' + rows + '</tbody></table>';
      }

      if ((prods1 && prods1.length) || (prods2 && prods2.length)) {
        html += '<div class="pdf-section-title" style="margin-top:12px;">Estoque de Produtos</div>';
        html += pdfStockTable(prods1 || [], 'PDV 1', '#2563eb');
        html += pdfStockTable(prods2 || [], 'PDV 2', '#059669');
      }

      html += '<div class="pdf-footer">' +
        '<span>Plataforma Jogos Olímpicos Sinodal PB</span>' +
        '<span>Emitido em ' + escHtml(dateStr) + '</span>' +
      '</div>';

      return html;
    }

    function buildPdfCol(s, title, colClass) {
      if (!s) s = {};
      var paidPct = s.orders_count > 0 ? Math.round((s.orders_paid / s.orders_count) * 100) : 0;
      var estornoRow = (s.total_refunded||0) > 0 || (s.orders_refunded||0) > 0
        ? '<div class="pdf-stat"><span class="pdf-stat-label">↩️ Estornos (' + (s.orders_refunded||0) + ')</span><span class="pdf-stat-value" style="color:#dc2626;">- R$ ' + formatMoney(s.total_refunded||0) + '</span></div>'
        : '';
      return '<div class="pdf-col ' + colClass + '">' +
        '<div class="pdf-col-head">' + title + '</div>' +
        '<div class="pdf-stat"><span class="pdf-stat-label">💵 Dinheiro</span><span class="pdf-stat-value">R$ ' + formatMoney(s.total_dinheiro||0) + '</span></div>' +
        '<div class="pdf-stat"><span class="pdf-stat-label">📱 PIX</span><span class="pdf-stat-value">R$ ' + formatMoney(s.total_pix||0) + '</span></div>' +
        '<div class="pdf-stat highlight"><span class="pdf-stat-label">🛒 Total Vendas</span><span class="pdf-stat-value">R$ ' + formatMoney(s.total_vendas||0) + '</span></div>' +
        estornoRow +
        '<div class="pdf-stat"><span class="pdf-stat-label">💰 Saldo</span><span class="pdf-stat-value">R$ ' + formatMoney(s.saldo||0) + '</span></div>' +
        '<div class="pdf-stat"><span class="pdf-stat-label">🧾 Pagos/Total</span><span class="pdf-stat-value">' + (s.orders_paid||0) + '/' + (s.orders_count||0) + ' (' + paidPct + '%)</span></div>' +
      '</div>';
    }

    // ── Helpers ────────────────────────────────────────────────────────

    function escHtml(s) {
      if (s == null) return '';
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function formatMoney(n) {
      return parseFloat(n || 0).toLocaleString('pt-BR', { minimumFractionDigits:2, maximumFractionDigits:2 });
    }

    function fmtDatetime(iso) {
      if (!iso) return '—';
      try {
        var d = new Date(iso);
        var dateStr = d.toLocaleDateString('pt-BR');
        var timeStr = d.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
        return dateStr + ' ' + timeStr;
      } catch(e) {
        return '';
      }
    }
  </script>
