<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — Sports Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">
        <span style="font-size:48px;">🏆</span>
        <h1 class="auth-title">Sports Platform</h1>
        <p class="auth-subtitle">Entre na sua conta para continuar</p>
      </div>

      <div id="alert" class="alert alert-error" style="display:none;"></div>

      <form id="login-form" autocomplete="on">
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" class="form-control" placeholder="seu@email.com" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary" id="submit-btn" style="width:100%; justify-content:center; margin-top:8px;">
          Entrar
        </button>
      </form>

      <hr class="divider">

      <div class="auth-footer">
        Não tem conta? <a href="register.html">Criar conta gratuita</a>
      </div>
      <div class="auth-footer" style="margin-top:8px;">
        <a href="index.html" style="color:#8b8da0; font-size:13px;">← Voltar ao início</a>
      </div>
    </div>
  </div>
  <div id="toast-container"></div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    redirectIfAuth();

    const form = document.getElementById('login-form');
    const alertEl = document.getElementById('alert');
    const btn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertEl.style.display = 'none';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email) {
        alertEl.textContent = 'Por favor, informe o e-mail.';
        alertEl.style.display = 'flex';
        return;
      }

      btn.innerHTML = '<span class="spinner"></span> Entrando...';
      btn.disabled = true;

      try {
        const data = await AuthAPI.login(email, password);
        localStorage.setItem('sp_token', data.access_token);
        // Fetch user info
        try {
          const user = await AuthAPI.me();
          setAuth(data.access_token, user);
        } catch {
          // If me() fails, still store the token with basic info
          localStorage.setItem('sp_token', data.access_token);
        }
        window.location.href = 'dashboard.html';
      } catch (err) {
        alertEl.textContent = err.message;
        alertEl.style.display = 'flex';
        btn.innerHTML = 'Entrar';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
