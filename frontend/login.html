<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="img/logo.ico" type="image/x-icon">
  <title>Jogos Olímpicos Sinodal PB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <div class="auth-split">

    <!-- Painel decorativo esquerdo -->
    <div class="auth-panel">
      <div class="auth-panel-bg"></div>
      <div class="auth-panel-content">
        <span class="auth-panel-logo">🏆</span>
        <h1 class="auth-panel-title">Sports Platform</h1>
        <p class="auth-panel-tagline">Gerencie seus campeonatos com excelência</p>
        <div class="auth-panel-stats">
          <div class="auth-stat-card">
            <div class="auth-stat-value">1.2k</div>
            <div class="auth-stat-label">Atletas</div>
          </div>
          <div class="auth-stat-card">
            <div class="auth-stat-value">48</div>
            <div class="auth-stat-label">Campeona.</div>
          </div>
          <div class="auth-stat-card">
            <div class="auth-stat-value">320</div>
            <div class="auth-stat-label">Jogos</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Formulário direito -->
    <div class="auth-form-side">
      <div class="auth-form-card">
        <div class="auth-logo">
          <img src="img/logo.png" alt="Logo" style="width:80px;height:auto;object-fit:contain;margin-bottom:8px;">
          <h1 class="auth-title">Jogos Olímpicos Sinodal PB</h1>
          <p class="auth-subtitle">Entre na sua conta para continuar</p>
        </div>

        <div id="alert" class="alert alert-error" style="display:none;"></div>

        <form id="login-form" autocomplete="on">
          <div class="form-group">
            <label for="email">E-mail</label>
            <div class="input-icon-wrap">
              <span class="input-icon">📧</span>
              <input type="email" id="email" class="form-control input-with-icon" placeholder="seu@email.com" required autocomplete="username">
            </div>
          </div>
          <div class="form-group">
            <label for="password">Senha</label>
            <div class="input-icon-wrap">
              <span class="input-icon">🔒</span>
              <input type="password" id="password" class="form-control input-with-icon" placeholder="••••••••" required autocomplete="current-password">
            </div>
          </div>
          <button type="submit" class="btn btn-primary auth-submit-btn" id="submit-btn">
            Entrar
          </button>
        </form>

        <div class="auth-credit">
          Desenvolvido por <strong>Miquéias Teles</strong>
        </div>
      </div>
    </div>

  </div>
  <div id="toast-container"></div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    redirectIfAuth();

    const form = document.getElementById('login-form');
    const alertEl = document.getElementById('alert');
    const btn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertEl.style.display = 'none';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email) {
        alertEl.textContent = 'Por favor, informe o e-mail.';
        alertEl.style.display = 'flex';
        return;
      }

      btn.innerHTML = '<span class="spinner"></span> Entrando...';
      btn.disabled = true;

      try {
        const data = await AuthAPI.login(email, password);
        localStorage.setItem('sp_token', data.access_token);
        try {
          const user = await AuthAPI.me();
          setAuth(data.access_token, user);
        } catch {
          localStorage.setItem('sp_token', data.access_token);
        }
        window.location.href = 'dashboard.html';
      } catch (err) {
        alertEl.textContent = err.message;
        alertEl.style.display = 'flex';
        btn.innerHTML = 'Entrar';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
