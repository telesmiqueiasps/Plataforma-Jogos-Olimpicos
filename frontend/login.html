<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="img/logo.ico" type="image/x-icon">
  <title>Jogos Olímpicos Sinodal PB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <div class="auth-split">

    <!-- Painel decorativo esquerdo com slideshow -->
    <div class="auth-panel auth-panel-slideshow">
      <!-- Foto de fundo com fade -->
      <img id="slide-bg" class="slide-bg-img" src="img/foto1.png" alt="Edição anterior">
      <!-- Overlay gradiente para legibilidade -->
      <div class="slide-overlay"></div>
      <!-- Conteúdo sobre as fotos -->
      <div class="auth-panel-content">
        <div class="auth-panel-top">
          <h1 class="auth-panel-title">Jogos Olímpicos</h1>
          <p class="auth-panel-tagline">Edição 2026</p>
        </div>
        <!-- Bolinhas indicadoras -->
        <div class="slide-dots">
          <span class="slide-dot" style="opacity:1" onclick="goToSlide(0)"></span>
          <span class="slide-dot" onclick="goToSlide(1)"></span>
          <span class="slide-dot" onclick="goToSlide(2)"></span>
          <span class="slide-dot" onclick="goToSlide(3)"></span>
          <span class="slide-dot" onclick="goToSlide(4)"></span>
          <span class="slide-dot" onclick="goToSlide(5)"></span>
        </div>
        <!-- Legenda -->
        <div class="slide-caption">📸 Edição anterior</div>
      </div>
    </div>

    <!-- Formulário direito -->
    <div class="auth-form-side">
      <div class="auth-form-card">
        <div class="auth-logo">
          <img src="img/logo.png" alt="Logo" style="width:80px;height:auto;object-fit:contain;margin-bottom:8px;">
          <h1 class="auth-title">Jogos Olímpicos Sinodal PB</h1>
          <p class="auth-subtitle">Entre na sua conta para continuar</p>
        </div>

        <div id="alert" class="alert alert-error" style="display:none;"></div>

        <form id="login-form" autocomplete="on">
          <div class="form-group">
            <label for="email">E-mail</label>
            <div class="input-icon-wrap">
              <span class="input-icon">📧</span>
              <input type="email" id="email" class="form-control input-with-icon" placeholder="seu@email.com" required autocomplete="username">
            </div>
          </div>
          <div class="form-group">
            <label for="password">Senha</label>
            <div class="input-icon-wrap">
              <span class="input-icon">🔒</span>
              <input type="password" id="password" class="form-control input-with-icon" placeholder="••••••••" required autocomplete="current-password">
            </div>
          </div>
          <button type="submit" class="btn btn-primary auth-submit-btn" id="submit-btn">
            Entrar
          </button>
        </form>

        <div class="auth-credit">
          Desenvolvido por <strong>Miquéias Teles</strong>
        </div>
      </div>
    </div>

  </div>
  <div id="toast-container"></div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Slideshow
    let currentSlide = 0;
    const slides = ['img/foto1.png','img/foto2.png','img/foto3.png',
                    'img/foto4.png','img/foto5.png','img/foto6.png'];

    function nextSlide() {
      currentSlide = (currentSlide + 1) % slides.length;
      updateSlide();
    }

    function goToSlide(index) {
      currentSlide = index;
      updateSlide();
    }

    function updateSlide() {
      const bg = document.getElementById('slide-bg');
      bg.style.opacity = '0';
      setTimeout(() => {
        bg.src = slides[currentSlide];
        bg.style.opacity = '1';
        document.querySelectorAll('.slide-dot').forEach((dot, i) => {
          dot.style.opacity = i === currentSlide ? '1' : '0.5';
        });
      }, 300);
    }

    setInterval(nextSlide, 4000);

    redirectIfAuth();

    const form = document.getElementById('login-form');
    const alertEl = document.getElementById('alert');
    const btn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertEl.style.display = 'none';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email) {
        alertEl.textContent = 'Por favor, informe o e-mail.';
        alertEl.style.display = 'flex';
        return;
      }

      btn.innerHTML = '<span class="spinner"></span> Entrando...';
      btn.disabled = true;

      try {
        const data = await AuthAPI.login(email, password);
        localStorage.setItem('sp_token', data.access_token);
        try {
          const user = await AuthAPI.me();
          setAuth(data.access_token, user);
        } catch {
          localStorage.setItem('sp_token', data.access_token);
        }
        window.location.href = 'dashboard.html';
      } catch (err) {
        alertEl.textContent = err.message;
        alertEl.style.display = 'flex';
        btn.innerHTML = 'Entrar';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
