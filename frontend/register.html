<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="img/logo.ico" type="image/x-icon">
  <title>Criar Conta — Jogos Olímpicos Sinodal PB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <div class="auth-split">

    <!-- Painel decorativo esquerdo -->
    <div class="auth-panel">
      <div class="auth-panel-bg"></div>
      <div class="auth-panel-content">
        <span class="auth-panel-logo">🏅</span>
        <h1 class="auth-panel-title">Junte-se a nós</h1>
        <p class="auth-panel-tagline">Crie sua conta e organize campeonatos incríveis</p>
        <div class="auth-panel-stats">
          <div class="auth-stat-card">
            <div class="auth-stat-value">100%</div>
            <div class="auth-stat-label">Gratuito</div>
          </div>
          <div class="auth-stat-card">
            <div class="auth-stat-value">∞</div>
            <div class="auth-stat-label">Campeon.</div>
          </div>
          <div class="auth-stat-card">
            <div class="auth-stat-value">7+</div>
            <div class="auth-stat-label">Modali.</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Formulário direito -->
    <div class="auth-form-side">
      <div class="auth-form-card">
        <div class="auth-logo">
          <span style="font-size:48px;">🏆</span>
          <h1 class="auth-title">Criar Conta</h1>
          <p class="auth-subtitle">Crie sua conta de organizador gratuitamente</p>
        </div>

        <div id="alert" class="alert alert-error" style="display:none;"></div>
        <div id="success" class="alert alert-success" style="display:none;"></div>

        <form id="register-form" autocomplete="off">
          <div class="form-group">
            <label for="name">Nome completo</label>
            <div class="input-icon-wrap">
              <span class="input-icon">👤</span>
              <input type="text" id="name" class="form-control input-with-icon" placeholder="João Silva" required autocomplete="name">
            </div>
          </div>
          <div class="form-group">
            <label for="email">E-mail</label>
            <div class="input-icon-wrap">
              <span class="input-icon">📧</span>
              <input type="email" id="email" class="form-control input-with-icon" placeholder="seu@email.com" required autocomplete="email">
            </div>
          </div>
          <div class="form-group">
            <label for="password">Senha</label>
            <div class="input-icon-wrap">
              <span class="input-icon">🔒</span>
              <input type="password" id="password" class="form-control input-with-icon" placeholder="Mínimo 6 caracteres" required minlength="6" autocomplete="new-password">
            </div>
            <span class="form-hint">Use pelo menos 6 caracteres</span>
          </div>
          <div class="form-group">
            <label for="confirm">Confirmar senha</label>
            <div class="input-icon-wrap">
              <span class="input-icon">🔒</span>
              <input type="password" id="confirm" class="form-control input-with-icon" placeholder="Repita a senha" required autocomplete="new-password">
            </div>
          </div>
          <button type="submit" class="btn btn-primary auth-submit-btn" id="submit-btn">
            Criar Conta
          </button>
        </form>

        <hr class="divider">

        <div class="auth-footer">
          <a href="dashboard.html" style="color:var(--text-muted);font-size:13px;">← Voltar ao Dashboard</a>
        </div>
      </div>
    </div>

  </div>
  <div id="toast-container"></div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    if (!isAuthenticated()) {
      window.location.replace('login.html');
    }

    const form = document.getElementById('register-form');
    const alertEl = document.getElementById('alert');
    const successEl = document.getElementById('success');
    const btn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertEl.style.display = 'none';
      successEl.style.display = 'none';

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;

      if (!name) {
        alertEl.textContent = 'Por favor, informe seu nome.';
        alertEl.style.display = 'flex';
        return;
      }
      if (password !== confirm) {
        alertEl.textContent = 'As senhas não coincidem. Tente novamente.';
        alertEl.style.display = 'flex';
        return;
      }
      if (password.length < 6) {
        alertEl.textContent = 'A senha deve ter pelo menos 6 caracteres.';
        alertEl.style.display = 'flex';
        return;
      }

      btn.innerHTML = '<span class="spinner"></span> Criando conta...';
      btn.disabled = true;

      try {
        await AuthAPI.register({ name, email, password, role: 'organizer' });
        successEl.textContent = 'Conta criada com sucesso! Redirecionando...';
        successEl.style.display = 'flex';
        form.reset();
        setTimeout(() => window.location.href = 'login.html', 2000);
      } catch (err) {
        alertEl.textContent = err.message;
        alertEl.style.display = 'flex';
        btn.innerHTML = 'Criar Conta';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
