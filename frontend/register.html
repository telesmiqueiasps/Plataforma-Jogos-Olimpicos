<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="img/logo.ico" type="image/x-icon">
  <title>Criar Conta — Jogos Olímpicos Sinodal PB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">
        <span style="font-size:48px;">🏆</span>
        <h1 class="auth-title">Criar Conta</h1>
        <p class="auth-subtitle">Crie sua conta de organizador gratuitamente</p>
      </div>

      <div id="alert" class="alert alert-error" style="display:none;"></div>
      <div id="success" class="alert alert-success" style="display:none;"></div>

      <form id="register-form" autocomplete="off">
        <div class="form-group">
          <label for="name">Nome completo</label>
          <input type="text" id="name" class="form-control" placeholder="João Silva" required autocomplete="name">
        </div>
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" class="form-control" placeholder="seu@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" class="form-control" placeholder="Mínimo 6 caracteres" required minlength="6" autocomplete="new-password">
          <span class="form-hint">Use pelo menos 6 caracteres</span>
        </div>
        <div class="form-group">
          <label for="confirm">Confirmar senha</label>
          <input type="password" id="confirm" class="form-control" placeholder="Repita a senha" required autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary" id="submit-btn" style="width:100%; justify-content:center; margin-top:8px;">
          Criar Conta
        </button>
      </form>

      <hr class="divider">

      <div class="auth-footer">
        <a href="dashboard.html" style="color:#8b8da0; font-size:13px;">← Voltar ao Dashboard</a>
      </div>
    </div>
  </div>
  <div id="toast-container"></div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Only allow access if authenticated
    if (!isAuthenticated()) {
      window.location.replace('login.html');
    }

    const form = document.getElementById('register-form');
    const alertEl = document.getElementById('alert');
    const successEl = document.getElementById('success');
    const btn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertEl.style.display = 'none';
      successEl.style.display = 'none';

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;

      if (!name) {
        alertEl.textContent = 'Por favor, informe seu nome.';
        alertEl.style.display = 'flex';
        return;
      }
      if (password !== confirm) {
        alertEl.textContent = 'As senhas não coincidem. Tente novamente.';
        alertEl.style.display = 'flex';
        return;
      }
      if (password.length < 6) {
        alertEl.textContent = 'A senha deve ter pelo menos 6 caracteres.';
        alertEl.style.display = 'flex';
        return;
      }

      btn.innerHTML = '<span class="spinner"></span> Criando conta...';
      btn.disabled = true;

      try {
        await AuthAPI.register({ name, email, password, role: 'organizer' });
        successEl.textContent = 'Conta criada com sucesso! Redirecionando para o login...';
        successEl.style.display = 'flex';
        form.reset();
        setTimeout(() => window.location.href = 'login.html', 2000);
      } catch (err) {
        alertEl.textContent = err.message;
        alertEl.style.display = 'flex';
        btn.innerHTML = 'Criar Conta';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
