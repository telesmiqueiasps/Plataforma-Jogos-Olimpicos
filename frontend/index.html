<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sports Platform</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav>
    <a class="brand" href="index.html">🏅 Sports Platform</a>
    <div class="nav-links">
      <span id="nav-user" style="color:var(--accent); font-size:0.9rem"></span>
      <a href="#" id="nav-logout" style="display:none">Sair</a>
      <a href="login.html" id="nav-login">Entrar</a>
    </div>
  </nav>

  <div class="container">

    <div class="tabs">
      <button class="tab-btn active" data-tab="sports">Modalidades</button>
      <button class="tab-btn" data-tab="events">Eventos</button>
    </div>

    <!-- Tab: Modalidades -->
    <div id="tab-sports">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem">
        <h2 style="font-size:1.2rem">Modalidades olímpicas</h2>
        <button class="btn btn-primary" id="btn-add-sport" style="display:none">+ Adicionar</button>
      </div>

      <div id="sports-list" class="card-grid">
        <div class="spinner"></div>
      </div>
    </div>

    <!-- Tab: Eventos -->
    <div id="tab-events" style="display:none">
      <h2 style="font-size:1.2rem; margin-bottom:1rem">Próximos eventos</h2>
      <div id="events-list">
        <p style="color:var(--muted)">Nenhum evento cadastrado ainda.</p>
      </div>
    </div>

  </div>

  <!-- Modal: Adicionar Modalidade -->
  <div id="modal-sport" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:100; align-items:center; justify-content:center;">
    <div class="card" style="width:100%; max-width:420px; margin:0 1rem">
      <h3 style="margin-bottom:1rem">Nova modalidade</h3>
      <form id="form-sport">
        <div class="form-group">
          <label>Nome</label>
          <input type="text" id="sport-name" required placeholder="Ex: Futebol" />
        </div>
        <div class="form-group">
          <label>Ícone (emoji)</label>
          <input type="text" id="sport-icon" placeholder="⚽" />
        </div>
        <div class="form-group">
          <label>Descrição</label>
          <textarea id="sport-desc" rows="2" placeholder="Breve descrição..."></textarea>
        </div>
        <div style="display:flex; gap:0.5rem; justify-content:flex-end">
          <button type="button" class="btn" id="btn-cancel-sport">Cancelar</button>
          <button type="submit" class="btn btn-primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    import { isLoggedIn, getMe, removeToken, getSports, createSport, deleteSport } from "./js/api.js";

    // --- Auth state ---
    const navUser = document.getElementById("nav-user");
    const navLogout = document.getElementById("nav-logout");
    const navLogin = document.getElementById("nav-login");
    const btnAddSport = document.getElementById("btn-add-sport");

    let currentUser = null;

    async function initAuth() {
      if (!isLoggedIn()) return;
      try {
        currentUser = await getMe();
        navUser.textContent = `Olá, ${currentUser.name.split(" ")[0]}`;
        navLogout.style.display = "inline";
        navLogin.style.display = "none";
        if (currentUser.role === "admin") btnAddSport.style.display = "inline-flex";
      } catch (_) {
        removeToken();
      }
    }

    navLogout.addEventListener("click", (e) => {
      e.preventDefault();
      removeToken();
      window.location.reload();
    });

    // --- Tabs ---
    document.querySelectorAll(".tab-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab-btn").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        const tab = btn.dataset.tab;
        document.getElementById("tab-sports").style.display = tab === "sports" ? "block" : "none";
        document.getElementById("tab-events").style.display = tab === "events" ? "block" : "none";
      });
    });

    // --- Sports list ---
    async function loadSports() {
      const container = document.getElementById("sports-list");
      try {
        const sports = await getSports();
        if (!sports.length) {
          container.innerHTML = "<p style='color:var(--muted)'>Nenhuma modalidade cadastrada.</p>";
          return;
        }
        container.innerHTML = sports.map((s) => `
          <div class="card" style="position:relative">
            <div class="sport-icon">${s.icon || "🏆"}</div>
            <strong>${s.name}</strong>
            <p style="color:var(--muted); font-size:0.85rem; margin-top:0.3rem">${s.description || ""}</p>
            ${currentUser?.role === "admin"
              ? `<button class="btn btn-danger" style="margin-top:0.8rem; padding:0.3rem 0.7rem; font-size:0.8rem"
                   data-id="${s.id}" onclick="handleDeleteSport(${s.id})">Remover</button>`
              : ""}
          </div>
        `).join("");
      } catch (_) {
        container.innerHTML = "<p style='color:var(--muted)'>Erro ao carregar modalidades.</p>";
      }
    }

    window.handleDeleteSport = async (id) => {
      if (!confirm("Remover esta modalidade?")) return;
      try {
        await deleteSport(id);
        loadSports();
      } catch (err) {
        alert(err.message);
      }
    };

    // --- Add sport modal ---
    const modal = document.getElementById("modal-sport");
    btnAddSport.addEventListener("click", () => { modal.style.display = "flex"; });
    document.getElementById("btn-cancel-sport").addEventListener("click", () => { modal.style.display = "none"; });

    document.getElementById("form-sport").addEventListener("submit", async (e) => {
      e.preventDefault();
      const data = {
        name: document.getElementById("sport-name").value.trim(),
        icon: document.getElementById("sport-icon").value.trim() || null,
        description: document.getElementById("sport-desc").value.trim() || null,
      };
      try {
        await createSport(data);
        modal.style.display = "none";
        e.target.reset();
        loadSports();
      } catch (err) {
        alert(err.message);
      }
    });

    // --- Init ---
    await initAuth();
    loadSports();
  </script>
</body>
</html>
